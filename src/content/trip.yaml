      黒斑山登山口（车坂峠）所在地；清晨开车到这里作为登山起点。
      注意：游客中心本身 11 月上旬 – 4 月下旬为冬季闭馆，我们来的时候建筑不开放，但登山口与停车场仍可到达。

  - id: kurofu-yama
    name:
      zh: 黒斑山
      en: Kurofu-yama
      ja: 黒斑山
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/QJGSUSwnEk115ggY7
    notes_zh: >-
      海拔 2404 m，浅間山外輪山的一座山峰，被誉为观赏浅間山最好的视角。
      计划：从高峰高原登山口上山，到山顶后航拍浅間山，再原路下山。
      冬季（12 月 / 1 月）积雪深、需雪靴 + 冰爪等冬季登山装备；
      浅間山为活火山、且位于上信越高原国立公园内，无人机使用需先确认国立公园飞行申报与火山区限制。

