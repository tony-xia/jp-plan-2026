    notes_zh: >-
      安藤忠雄设计的「薰衣草山头大佛」。
      冬季（11 – 3 月）拜观时间 10:00 – 15:00（比夏季短）。
      ⚠️ 著名的「水庭」11/4 – 4 月下旬放空不注水，没有镜面反射。
      冬季变成白雪薰衣草田，佛首突出雪面，另有意境。
      札幌駅开车约 40 分钟；或 地下鉄真駒内駅 换 中央バス 真 108（约 20 分钟，¥500）。
      3,300 车位停车场免费。现场停留建议 60 – 90 分钟。

  - id: mt-moiwa-ropeway
