      奥庭本身厕所与避难设施关闭，御中道步道冬季封闭。12-1 月基本不可达。
      记录用户提供的 Pin 以备存档；实际行程不安排。

  # ────── Phase 2: Hakodate ──────
  - id: mt-hakodate-observatory
