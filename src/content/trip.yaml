# Japan trip itinerary — 2026-12-26 to 2027-01-19 (25 days, 24 nights).
# Two phases (2026-04-22 sixth-pass: Sapporo return leg dropped; Abashiri +1, Toya +1;
#   rental pickup moved to day-3 arrival in Sapporo):
#   Phase 1 (days 01-20, 20 nights) = Hokkaido clockwise loop, single Sapporo stay:
#                                     Hakodate 2 (day-01 arrival via Haneda + 東北・北海道新幹線)
#                                     → Sapporo 7 (Dec 28 – Jan 4; NYE + NYD; rental pickup on arrival day-3)
#                                     → Wakkanai 2 (Surfeel; long drive from Sapporo + 宗谷岬 buffer day)
#                                     → Cape Sōya → Abashiri 3 (Okhotsk coast drive + day-14 知床 Utoro day)
#                                     → Otaru 3 (central; Biei now a day-05 round-trip road trip from Sapporo)
#                                     → day-18 morning Sapporo car return → 北斗 → Windsor Toya 3
#   Phase 2 (days 21-25, 4 nights)  = Tokyo (day-21 = Toya → Tokyo direct via 北斗 洞爺 → 新函館北斗 + 新幹線;
#                                            day-24 = slack day)
# Full requirements source: docs/requirements.md
# Validated against src/lib/schema.ts at build time.

