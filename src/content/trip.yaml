      ★ 2027-01 预估开市日：1/3（第 1 周日）和 1/17（第 3 周日）—— 1/17 恰好在我们东京档期内，
      是本次旅行接触「公开骨董」的最佳固定场合。品类：和服 / 浮世绘 / 伊万里 / 九谷 / 有田陶瓷 /
      明治大正玻璃 / 佛具 / 根付 / 日本刀 / 古钱币。⚠️ 户外活动，下雨 / 大雪可能取消 —— 前一天查官网。

