        ja: 〒047-0151 北海道小樽市朝里
    notes_zh: >-
      ★ 航拍日主场：「朝里スカイループ」札樽自動車道 朝里 IC 双层环形高架桥，
      是北海道最出片的航拍结构物之一，周围森林冬季全白。附近 朝里ダム、朝里川温泉 可补充取景。
      ⚠️ 无人机注意：
      ① DID 区：小樽市中心属 DID，朝里本地多半不在 DID —— 用地理院地图 DID 图层确认边界；
         凡 DID 区飞行需 ≥10 工作日前提交 DIPS 2.0 申请获 MLIT/JCAB 许可。
      ② 严禁直飞高速公路正上方 —— 必须从侧面或相邻非道路地面起飞。
      ③ 国定公园层：祝津 – 小樽海岸 属于 Niseko-Shakotan-Otaru Kaigan 国定公园 ——
         按北海道规则不强制申报，但进入自然保护区前检查标识和告示牌。
      ④ 冬季海边风大；消费级无人机超过约 10 m/s 就危险。天气差时走备用方案 —— 仅地面自拍。
      ⑤ 锂电池 -10℃ 容量下降约 30 – 40%。多备电池，贴身保温，飞前预热。

