# Japan trip itinerary — 2026-12-27 to 2027-01-18 (23 days, 22 nights).
# Three phases:
#   Phase 1 (days 01-04, 3 nights)  = Karuizawa (preferred) or Fuji (fallback)
#   Phase 2 (days 05-17, 13 nights) = Hokkaido: Hakodate → Toyako → Biei → Abashiri → Wakkanai → Otaru → Sapporo
#   Phase 3 (days 18-23, 6 nights)  = Tokyo (incl. Sapporo→Tokyo transit on day 18)
# Full requirements source: docs/requirements.md
# Validated against src/lib/schema.ts at build time.

title_zh: "日本之旅 2026-2027"
travelers:
  - Tony
  - AZhu
  - Crystal
  - Du
startDate: "2026-12-27"
endDate: "2027-01-18"

segments:
  - id: fuji-or-karuizawa
    name:
      zh: 富士 或 轻井泽
      en: Fuji or Karuizawa
      ja: 富士 または 軽井沢
    days: [day-01, day-02, day-03, day-04]
  - id: hokkaido
    name:
      zh: 北海道
      en: Hokkaido
      ja: 北海道
    days:
      - day-05
      - day-06
      - day-07
      - day-08
      - day-09
      - day-10
      - day-11
      - day-12
      - day-13
      - day-14
      - day-15
      - day-16
      - day-17
  - id: tokyo
    name:
      zh: 东京
      en: Tokyo
      ja: 東京
    days: [day-18, day-19, day-20, day-21, day-22, day-23]

places:
  # ────── transit hubs ──────
  - id: haneda-airport
    name:
      zh: 羽田机场
      en: Haneda Airport
      ja: 羽田空港
    kind: station
    address:
      full:
        zh: 东京都大田区羽田机场
        en: Haneda Airport, Ota, Tokyo
        ja: 東京都大田区羽田空港

  - id: shin-hakodate-hokuto-station
    name:
      zh: 新函馆北斗站
      en: Shin-Hakodate-Hokuto Station
      ja: 新函館北斗駅
    kind: station
    address:
      full:
        zh: 北海道北斗市市渡 1-1-1
        ja: 〒041-1245 北海道北斗市市渡1丁目1-1
    notes_zh: 北海道新干线终点站；从东京 → 这里 约 4 小时。再换 JR 特急 北斗 → 札幌 约 3.5 小时。

  - id: hakodate-station
    name:
      zh: 函馆站
      en: Hakodate Station
      ja: 函館駅
    kind: station
    address:
