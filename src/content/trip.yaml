        zh: 北海道函馆市若松町 12-13
        ja: 〒040-0063 北海道函館市若松町12-13

  - id: toya-station
    name:
      zh: 洞爷站
      en: Toya Station
      ja: 洞爺駅
    kind: station
    address:
      full:
        zh: 北海道虻田郡洞爷湖町旭町 8
        ja: 〒049-5605 北海道虻田郡洞爺湖町旭町8

  - id: sapporo-station
    name:
      zh: 札幌站
      en: Sapporo Station
      ja: 札幌駅
    kind: station
    address:
      full:
        zh: 北海道札幌市北区北 6 条西 4 丁目
        ja: 〒060-0806 北海道札幌市北区北6条西4丁目

  # ────── Phase 1: Karuizawa / Fuji ──────
  - id: peepolo-norikura
    name:
      zh: 皮波洛乗鞍
      en: Peepolo Norikura
      ja: ピーポロ乗鞍
    kind: hotel
    address:
      full:
        zh: 长野县松本市安昙 4306（邮编 390-1513）
        ja: 〒390-1513 長野県松本市安曇4306
    notes_zh: >-
      1997 年富士电视台经典日剧《恋爱世纪》（ラブジェネレーション）女主角理子家的取景地，
      位于乘鞍高原温泉。是一间保存得很好的日式旅馆，房间很少、非常难订。
      如果能订到 2 间房（价格偏高），我们就在这里住一晚。

  - id: kurumayama-skypark
    name:
      zh: 车山高原 SKYPARK
      en: Kurumayama Kogen SKYPARK
      ja: 車山高原スカイパーク
    kind: sight
    address:
      full:
        zh: 长野县茅野市北山 3413（邮编 391-0301）
        ja: 〒391-0301 長野県茅野市北山3413
    notes_zh: >-
      车山高原观景地（冬季为滑雪场）。我们不滑雪，纯粹上去看雪景、
      欣赏八岳、富士山与南北阿尔卑斯的全景。可乘缆车登顶，山顶视野非常开阔。

  - id: takamine-kogen-visitor-center
    name:
      zh: 高峰高原游客中心
      en: Takamine Kogen Visitor Center
      ja: 高峰高原ビジターセンター
    kind: other
    address:
      full:
        zh: 长野县小诸市高峰高原 704（邮编 384-0041）
        ja: 〒384-0041 長野県小諸市高峰高原704
    notes_zh: >-
      黒斑山登山口（车坂峠）所在地；清晨开车到这里作为登山起点。
      注意：游客中心本身 11 月上旬 – 4 月下旬为冬季闭馆，我们来的时候建筑不开放，但登山口与停车场仍可到达。
      条件性访问 —— 仅当第一段行程包含轻井泽时前往。

  - id: kurofu-yama
    name:
      zh: 黒斑山
      en: Kurofu-yama
      ja: 黒斑山
    kind: sight
    notes_zh: >-
      海拔 2404 m，浅間山外輪山的一座山峰，被誉为观赏浅間山最好的视角。
      计划：从高峰高原登山口上山，到山顶后航拍浅間山，再原路下山。
      冬季（12 月 / 1 月）积雪深、需雪靴 + 冰爪等冬季登山装备；
      浅間山为活火山、且位于上信越高原国立公园内，无人机使用需先确认国立公园飞行申报与火山区限制。
      条件性访问 —— 仅当第一段行程包含轻井泽时前往。

  - id: karuizawa-kogen-church
    name:
      zh: 轻井泽高原教会
      en: Karuizawa Kogen Church
      ja: 軽井沢高原教会
    kind: shrine
    address:
      full:
        zh: 长野县北佐久郡轻井泽町长仓星野 2144（邮编 389-0195）
        ja: 〒389-0195 長野県北佐久郡軽井沢町長倉星野2144
    notes_zh: >-
      位于星野度假区的著名教会。1921 年起源于星野温泉内的「艺术自由教育讲习会」，
      内村鑑三命名当时的木屋为「星野遊学堂」，这个名字至今仍挂在教会入口。
      条件性访问 —— 仅当第一段行程包含轻井泽时前往。

  - id: norikura-info-center
    name:
      zh: 乘鞍高原观光案内所
      en: Norikura Kogen Tourist Information Center
      ja: 乗鞍高原観光案内所
    kind: other
    address:
      full:
        zh: 长野县松本市安昙 4306-5（邮编 390-1520）
        ja: 〒390-1520 長野県松本市安曇4306-5
    notes_zh: 前往皮波洛乗鞍路上的短暂停留点 —— 买点吃的、喝点水。

  - id: mount-omuro
    name:
      zh: 大室山
      en: Mount Omuro
      ja: 大室山
    kind: sight
    address:
      full:
        zh: 静冈县伊东市富户 1317-5
        ja: 静岡県伊東市富戸1317-5
    notes_zh: >-
      伊豆半岛的标志性单成火山，锅状山体，乘登山缆车 6 分钟可到山顶（约海拔 580 m）。
      条件访问 —— 富士方案（Scenario B）下的可选项。

  - id: kawana-stained-glass-museum
    name:
      zh: 伊豆高原 · 川奈彩色玻璃美术馆
      en: Kawana Stained Glass Museum
      ja: 川奈ステンドグラス美術館
    kind: sight
    address:
      full:
        zh: 静冈县伊东市川奈 1439-1
        ja: 静岡県伊東市川奈1439-1
    notes_zh: 条件访问 —— 富士方案（Scenario B）下，时间允许时前往。

  # ────── Phase 2: Hakodate ──────
  - id: mt-hakodate-observatory
    name:
      zh: 函馆山展望台
      en: Mt. Hakodate Observatory
      ja: 函館山展望台
    kind: sight
    address:
      full:
        zh: 北海道函馆市函馆山
        ja: 〒040-0000 北海道函館市函館山
    notes_zh: >-
      「百万夫人夜景」所在地。冬季函馆山登山道路封闭，禁止汽车、巴士、出租上山，
      只能乘函馆山缆车（125 人大轿厢，3 分钟，冬季 2026-11 – 2027-04 运营）。
      山顶风大气温低，务必带厚外套、围巾、手套、帽子。日落后看夜景最佳。

  # ────── Phase 2: Lake Toya / Usu ──────
  - id: windsor-hotel-toya
    name:
      zh: 温莎酒店 洞爷 Vignette Collection
      en: The Windsor Hotel TOYA, Vignette Collection
      ja: ザ・ウィンザーホテル洞爺 Vignette Collection
    kind: hotel
    address:
      full:
        zh: 北海道虻田郡洞爷湖町清水 336
        ja: 〒049-5722 北海道虻田郡洞爺湖町清水336
    notes_zh: >-
      2008 年 G8 洞爺湖峰会的主会场。山顶豪华度假酒店，绝景。住 2 晚 = 2 间房。
      ★ 从 JR 洞爺駅 可乘 酒店免费接驳巴士（需提前一天 18:00 前预约）。
      目前班次：11:00 / 13:00 / 14:20 / 16:55 / 19:00，单程约 40 分钟。
      出发前一周再次确认最新时刻表。

  - id: toyako-silo-observation-deck
    name:
      zh: 洞爷国立公园 筒仓展望台
      en: Toya National Park Silo Observation Deck
      ja: サイロ展望台
    kind: sight
    address:
      full:
        zh: 北海道虻田郡洞爷湖町成香 3-5
        ja: 〒049-5722 北海道虻田郡洞爺湖町成香3-5
    notes_zh: >-
      洞爷湖畔高地的免费展望台。冬季（11 月 – 4 月）营业 8:30 – 17:00，入场免费，全年无休。
      1 – 3 月院内有雪地娱乐区（雪地摩托、雪上筏），可顺便玩。

  - id: usuzan-ropeway
    name:
      zh: 有珠山缆车 · 洞爷湖展望台
      en: Usuzan Ropeway + Toyako Observation Deck
      ja: 有珠山ロープウェイ・洞爺湖展望台
    kind: sight
    address:
      full:
        zh: 北海道有珠郡壮瞥町字昭和新山 184-5
        ja: 〒052-0102 北海道有珠郡壮瞥町字昭和新山184-5
    notes_zh: >-
      从昭和新山山麓站缆车上山顶站。冬季营业 9:00 – 16:00（季节变动）。
      山顶站旁有「洞爺湖展望台」，再步行约 7 分钟可到「火口原展望台」。
      ⚠️ 冬季（11 月 – 4 月）外輪山遊歩道封闭，无法走到銀沼大火口 / 外輪山展望台。

  - id: noboribetsu-jigokudani
    name:
      zh: 登别 地狱谷
      en: Noboribetsu Jigokudani Valley
      ja: 登別地獄谷
    kind: sight
    address:
      full:
        zh: 北海道登别市登别温泉町无番地
        ja: 〒059-0551 北海道登別市登別温泉町無番地
    notes_zh: 活火山造就的硫磺地狱谷 + 温泉街。距洞爷湖约 40 – 50 分钟车程，时间允许时前往。

  # ────── Phase 2: Biei / Furano ──────
  - id: biei-christmas-tree
    name:
      zh: 美瑛 圣诞树之木
      en: Biei Christmas Tree
      ja: クリスマスツリーの木
    kind: sight
    address:
      full:
        zh: 北海道上川郡美瑛町（邮编 071-0471）
        ja: 〒071-0471 北海道上川郡美瑛町
    notes_zh: >-
      一株独立的云杉，形如圣诞树，积雪时尤其上镜。
      ⚠️ 无专用停车场；周围全是私有农地与生活道路。不要将车停在生活道路上；绝对不要踏入农田或雪原。只能从路边观赏/拍摄。

  - id: biei-seven-stars-tree
    name:
      zh: 美瑛 七星之木
      en: Biei Seven Stars Tree
      ja: セブンスターの木
    kind: sight
    address:
      full:
        zh: 北海道上川郡美瑛町北瑛（邮编 071-0224）
        ja: 〒071-0224 北海道上川郡美瑛町北瑛
    notes_zh: 1976 年被选为日本烟草「セブンスター」包装。有专用停车场（含巴士车位）。

  - id: shirogane-blue-pond
    name:
      zh: 白金青池
      en: Shirogane Blue Pond (Aoiike)
      ja: 白金青い池
    kind: sight
    address:
      full:
        zh: 北海道上川郡美瑛町白金
        ja: 〒071-0235 北海道上川郡美瑛町白金
    notes_zh: >-
      用户问：一天中什么时间去最好？
      ★ 夏季青色最亮（5 – 6 月），冬季池面结冰+积雪，白天的「蓝」不明显。
      ★ 冬季主看「ライトアップ 灯光秀」：2026-10-24 – 2027-04-22 期间日落后 – 21:00，
        12 月开始时间约 16:30，1 月约 17:00，每 10 分钟一段光影故事循环。
      ★ 2026-12-31 → 2027-01-03 灯光延长到凌晨 2:00 —— 我们在北海道过年，可安排在这个特别时段。
      推荐日程：日落前约 1 小时到达，白天 + 灯光亮起一次看完，约 45 – 60 分钟，带三脚架。

  # ────── Phase 2: Abashiri / Shiretoko ──────
  - id: abashiri-city
    name:
      zh: 网走市
      en: Abashiri City
      ja: 網走市
    kind: other
    address:
      full:
        zh: 北海道网走市
        ja: 北海道網走市
    notes_zh: >-
      鄂霍次克海沿岸城市；流氷观光地。
      🚨 流氷（ryūhyō）一般 1 月下旬 – 3 月上旬才登陆，2 月最盛。我们的行程（1 月上 – 中旬）
      多半赶不上真正的流氷，也不能坐「おーろら」破冰船（1 月下旬才开航）。
      替代：オホーツク流氷館 室内 -15℃ 展示真冰体验；能取岬冬日海岸雪景仍有可观。

  - id: masuura-viewpoint-parking
    name:
      zh: 流冰街道 · 鳟浦 观景停车带
      en: View Point Parking Ryūhyō-Kaidō Masuura
      ja: ビューポイントパーキング流氷街道・鱒浦
    kind: sight
    address:
      full:
        zh: 北海道网走市鳟浦（邮编 099-3119）
        ja: 〒099-3119 北海道網走市鱒浦
    notes_zh: >-
      「感動の径」海岸驾驶路线上的观景停车带。天气好时可远眺知床连山。
      原本为观流氷而设；我们的行程期还没流氷，但雪白海岸仍好看。

  - id: road-to-heaven-shari
    name:
      zh: 通天之路
      en: Road to Heaven (Tenni Tsuzuku Michi)
      ja: 天に続く道
    kind: sight
    address:
      full:
        zh: 北海道斜里郡斜里町峰浜（国道 334 号・244 号）
        ja: 北海道斜里郡斜里町峰浜（国道334号・244号）
    notes_zh: >-
      约 18 – 28 km 的笔直道路，看上去像通往天空。距 JR 知床斜里駅 约 15 分钟车程。
      ⚠️ 冬季注意事项：①起点停车场与观景木台冬季关闭；②路面只有 2 月才固定除雪，
      12 月 – 1 月清晨可能因未除雪而通行不能 —— 当日实地判断；③目前只能从路边拍照，
      没有官方观景平台。

  - id: okhotsk-ryuhyo-museum
    name:
      zh: 鄂霍次克流冰馆 + 天都山展望台
      en: Okhotsk Ryūhyō Museum + Tentōzan Observatory
      ja: オホーツク流氷館・天都山展望台
    kind: sight
    address:
      full:
        zh: 北海道网走市天都山 244-3
        ja: 〒093-0044 北海道網走市天都山244-3
    notes_zh: >-
      室内 -15℃ 冷冻体感室，展示真流氷；可做「湿毛巾瞬冻」小实验。
      顶楼天都山展望台 360° 可眺望网走五湖 + 鄂霍次克海 + 知床连山 + 阿寒山脈。
      流氷未到时，这里是替代真流氷体验的核心选项。

  - id: cape-notoro
    name:
      zh: 能取岬
      en: Cape Notoro
      ja: 能取岬
    kind: sight
    address:
      full:
        zh: 北海道网走市美岬
        ja: 〒093-0216 北海道網走市美岬
    notes_zh: >-
      鄂霍次克海突出的海岬，灯塔、断崖、草原。流氷最盛时可俯瞰流氷带；
      没流氷时依然是非常漂亮的冬日海岸。距网走市中心约 20 分钟车程。

  - id: oshinkoshin-falls
    name:
      zh: 奥辛科辛瀑布
      en: Oshinkoshin Falls
      ja: オシンコシンの滝
    kind: sight
    address:
      full:
        zh: 北海道斜里郡斜里町ウトロ西
        ja: 〒099-4355 北海道斜里郡斜里町ウトロ西
    notes_zh: 知床方向途中的瀑布，冬季部分结冰，很有冲击力。前往 天に続く道 或 知床ウトロ 方向的顺路景点。

  # ────── Phase 2: Wakkanai / Cape Sōya ──────
  - id: cape-soya
    name:
      zh: 宗谷岬
      en: Cape Sōya
      ja: 宗谷岬
    kind: sight
    address:
      full:
        zh: 北海道稚内市宗谷岬
        ja: 〒098-6758 北海道稚内市宗谷岬
    notes_zh: >-
      日本本土最北端。距稚内市中心约 30 km / 40 分钟车程，国道 238 号全年通车。
      标志：「日本最北端之地」三角碑、「宗谷岬之歌」石碑。晴天可看到 43 km 外的萨哈林岛。
      ⚠️ 稚内冬季风暴大，白化天气（ホワイトアウト）常见，出发前查天气。

  - id: surfeel-hotel-wakkanai
    name:
      zh: Surfeel 酒店 稚内
      en: Surfeel Hotel Wakkanai
      ja: サフィールホテル稚内
    kind: hotel
    address:
      full:
        zh: 北海道稚内市开运 1-2-2
        ja: 〒097-0023 北海道稚内市開運1-2-2
