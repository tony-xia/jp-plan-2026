    googleMapsUrl: https://maps.app.goo.gl/xoQjgjuWjxHSuTPB6
    bookingUrl: https://www.booking.com/hotel/jp/the-windsor-toya-resort-spa.html
    address:
      full:
        zh: 北海道虻田郡洞爷湖町清水 336
        ja: 〒049-5722 北海道虻田郡洞爺湖町清水336
    photos:
      - /photos/windsor-hotel-toya/1.jpg
      - /photos/windsor-hotel-toya/2.jpg
      - /photos/windsor-hotel-toya/3.jpg
      - /photos/windsor-hotel-toya/5.jpg
      - /photos/windsor-hotel-toya/6.jpg
      - /photos/windsor-hotel-toya/7.jpg
    notes_zh: >-
      2008 年 G8 洞爺湖峰会的主会场。山顶豪华度假酒店，绝景。住 2 晚 = 2 间房。
      ★ 从 JR 洞爺駅 可乘 酒店免费接驳巴士（需提前一天 18:00 前预约）。
      目前班次：11:00 / 13:00 / 14:20 / 16:55 / 19:00，单程约 40 分钟。
      出发前一周再次确认最新时刻表。

  - id: toyako-silo-observation-deck
    name:
      zh: 洞爷国立公园 筒仓展望台
      en: Toya National Park Silo Observation Deck
      ja: サイロ展望台
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/vbz1fb4sMXW5NMvJ8
    address:
      full:
        zh: 北海道虻田郡洞爷湖町成香 3-5
