days:
  # ─────────────────── Phase 1 ───────────────────
  - id: day-01
    date: "2026-12-27"
    city: fuji-or-karuizawa
    title_zh: 第 1 天 · 抵达日本
    intro_zh: 早上全员抵达羽田机场，会合后取车（租车自驾），一起出发前往本段行程的住宿地。
    activities:
      - id: day-01-haneda-arrival
        start: "09:00"
        place: { ref: haneda-airport }
        notes_zh: 所有人早上抵达羽田机场集合，随后取车出发。

  - id: day-02
    date: "2026-12-28"
    city: fuji-or-karuizawa
    title_zh: 第 2 天
    activities:
      - id: day-02-norikura-info-stop
        place: { ref: norikura-info-center }
        notes_zh: 前往皮波洛乗鞍的路上短暂停留，补给饮水、吃点东西。
    bookings:
      - id: day-02-peepolo-norikura
        kind: hotel
        title_zh: "住宿：皮波洛乗鞍（待确认）"
        start: "2026-12-28"
        end: "2026-12-29"
        address:
          full:
            zh: 长野县松本市安昙 4306（邮编 390-1513）
            ja: 〒390-1513 長野県松本市安曇4306
        details_zh: >-
          《恋爱世纪》女主角理子家的取景地，房间极少、非常抢手、价格较高。
          需订到 2 间房；日期可视全程安排调整。

  - id: day-03
    date: "2026-12-29"
    city: fuji-or-karuizawa
    title_zh: 第 3 天
    activities:
      - id: day-03-kurumayama
        place: { ref: kurumayama-skypark }
        notes_zh: 不滑雪，乘缆车上车山山顶看雪景与八岳 / 富士山 / 阿尔卑斯山脉全景。

  - id: day-04
    date: "2026-12-30"
    city: fuji-or-karuizawa
    title_zh: 第 4 天
    activities:
      - id: day-04-karuizawa-kogen-church
        place: { ref: karuizawa-kogen-church }
        notes_zh: "仅轻井泽方案 —— 星野度假区的历史教会。"

  # ─────────────────── Phase 2: Hokkaido ───────────────────
  - id: day-05
    date: "2026-12-31"
    city: hokkaido
    title_zh: 第 5 天 · 前往函馆
    intro_zh: >-
      早上从 Phase 1 驻地出发，经东京换北海道新干线到 新函馆北斗，再换函馆ライナー 到 函馆駅。
      全程约 6 – 7 小时，抵达后办理入住。跨年夜 函馆。
    activities:
      - id: day-05-shinkansen
        place: { ref: shin-hakodate-hokuto-station }
        notes_zh: 换乘点：从新函馆北斗下新干线，转 JR 函館ライナー 约 15 分钟到 函馆駅。
      - id: day-05-hakodate-arrival
        place: { ref: hakodate-station }
        notes_zh: 抵达函馆入住酒店；晚上可在朝市周边或元町区吃元旦跨年饭。

  - id: day-06
    date: "2027-01-01"
    city: hokkaido
    title_zh: 第 6 天 · 元旦 · 函馆
    intro_zh: >-
      函馆白日 + 夜景日。早上朝市吃海鲜丼；白天走元町坂 + 红砖仓库；黄昏前上函馆山看日落接百万夜景。
    activities:
      - id: day-06-mt-hakodate
        start: "16:30"
        place: { ref: mt-hakodate-observatory }
        notes_zh: >-
          冬季禁止汽车 / 巴士 / 出租上山，只能缆车。日落约 16:20；提前到山麓站排缆车。
          保暖必备（厚外套、围巾、手套、帽子）。

  - id: day-07
    date: "2027-01-02"
    city: hokkaido
    title_zh: 第 7 天 · 函馆 → 洞爷 Windsor
    intro_zh: >-
      早上 / 中午坐 JR 特急 北斗 从 函馆 → 洞爺駅（约 2 小时 20 分）。
      配合 Windsor 免费接驳巴士发车时间（11:00 / 13:00 / 14:20 / 16:55 / 19:00）到站。
      ★ 前一天 18:00 前务必电话预约接驳。
    activities:
      - id: day-07-toya-station
        place: { ref: toya-station }
        notes_zh: JR 洞爺駅 下车，候 Windsor 接驳巴士。

  - id: day-08
    date: "2027-01-03"
    city: hokkaido
    title_zh: 第 8 天 · Lake Toya 周边
    intro_zh: >-
      Windsor 住宿第 2 晚。上午 / 下午借酒店班车或打车跑 Silo 展望台 + 有珠山缆车；
      如时间 + 体力允许，加 登别地狱谷（开车 40 – 50 分钟）。
    activities:
      - id: day-08-silo
        place: { ref: toyako-silo-observation-deck }
        notes_zh: 洞爷湖全景免费展望台；冬季营业 8:30 – 17:00。
      - id: day-08-usuzan
        place: { ref: usuzan-ropeway }
        notes_zh: 有珠山缆车上山顶；走到火口原展望台约 7 分钟。冬季外輪山遊歩道封闭。
      - id: day-08-noboribetsu
        place: { ref: noboribetsu-jigokudani }
        notes_zh: 时间允许，下午加 登别地狱谷；傍晚回酒店。

  - id: day-09
    date: "2027-01-04"
    city: hokkaido
    title_zh: 第 9 天 · 洞爷 → 札幌取车 → 美瑛
    intro_zh: >-
      JR 洞爺 → 札幌（特急 北斗 约 2 小时）。札幌取租车。下午开到美瑛 / 富良野
      （180 km，冬季估 3 – 3.5 小时）。如果取车拖到晚，考虑先在札幌过一晚 —— 用户偏好不过札幌，
      以取车时间当日判断。
    activities:
      - id: day-09-sapporo-pickup
        place: { ref: sapporo-station }
        notes_zh: 札幌站附近取车。
      - id: day-09-drive-to-biei
        place: { ref: shirogane-blue-pond }
        notes_zh: 若到美瑛已黄昏，可直接开去 白金青い池 赶 16:30 – 21:00 灯光时段。

  - id: day-10
    date: "2027-01-05"
    city: hokkaido
    title_zh: 第 10 天 · 美瑛 → 网走
    intro_zh: >-
      早上跑 美瑛丘陵（クリスマスツリー + セブンスター）。下午开到网走
      （约 220 km，冬季估 4 – 5 小时）。入住 网走。
    activities:
      - id: day-10-christmas-tree
        place: { ref: biei-christmas-tree }
        notes_zh: ⚠️ 无停车场 + 私人农地，路边取景即走，绝不踏入田地。
      - id: day-10-seven-stars-tree
        place: { ref: biei-seven-stars-tree }
        notes_zh: 有停车场，比 クリスマスツリー 好停。
      - id: day-10-drive-to-abashiri
        place: { ref: abashiri-city }
        notes_zh: 中午后出发开到网走；注意冬季行车时间。

  - id: day-11
    date: "2027-01-06"
    city: hokkaido
    title_zh: 第 11 天 · 网走 + 知床方向
    intro_zh: >-
      网走全天。上午 オホーツク流氷館（-15℃ 室内真冰替代品）+ 天都山展望台；
      可选 能取岬；下午前往 天に続く道（斜里町，从网走约 1 小时车程）；回程加 オシンコシン滝 + 鱒浦 ビューポイント。
    activities:
      - id: day-11-ryuhyo-museum
        place: { ref: okhotsk-ryuhyo-museum }
        notes_zh: 流氷未到时这里是真冰替代体验的首选。
      - id: day-11-cape-notoro
        place: { ref: cape-notoro }
        notes_zh: 冬日鄂霍次克海岸；天气好时非常出片。
      - id: day-11-road-to-heaven
        place: { ref: road-to-heaven-shari }
        notes_zh: >-
          冬季注意事项：起点观景台冬季关闭；道路只有 2 月才保证除雪。当日实地观察再决定是否驾入。
      - id: day-11-oshinkoshin
        place: { ref: oshinkoshin-falls }
        notes_zh: 部分结冰的大瀑布，回程顺路。
      - id: day-11-masuura
        place: { ref: masuura-viewpoint-parking }
        notes_zh: 回网走前最后一个观景停车带。

  - id: day-12
    date: "2027-01-07"
    city: hokkaido
    title_zh: 第 12 天 · 网走 → 稚内（长途日）
    intro_zh: >-
      🚨 本日最硬的一段：网走 → 稚内 约 326 km，冬季 5 – 6+ 小时，海岸国道 238 号遇暴风/白化时易封路。
      早出；带充足零食 + 饮水 + 燃油余量。到稚内入住 Surfeel。
    activities:
      - id: day-12-drive-to-wakkanai
        place: { ref: surfeel-hotel-wakkanai }
        notes_zh: 抵达后办理入住。

  - id: day-13
    date: "2027-01-08"
    city: hokkaido
    title_zh: 第 13 天 · 宗谷岬 → 小樽（超长途日）
    intro_zh: >-
      🚨 双长途日之二：早上跑 宗谷岬（日本最北端），然后一路南下开到小樽
      （约 330 km，冬季 5 – 6+ 小时）。尽量早起；中途可在 羽幌 / 留萌 吃午饭。
    activities:
      - id: day-13-cape-soya
        start: "08:30"
        place: { ref: cape-soya }
        notes_zh: 稚内冬季风暴大，出发前查当天天气；必要时调整出发时间。
      - id: day-13-noshappu-cape
        place: { ref: noshappu-cape }
        notes_zh: 如果时间允许回程前顺便看一眼。
      - id: day-13-drive-to-otaru
        place: { ref: otaru-canal }
        notes_zh: 黄昏/夜抵达小樽，先入住；如有体力可在运河边看亮灯。

  - id: day-14
    date: "2027-01-09"
    city: hokkaido
    title_zh: 第 14 天 · 小樽 市区游
    intro_zh: >-
      小樽白天 + 夜景日。白天：运河 + 堺町通り + 音乐盒堂 + 寿司午餐（鱼真，避开周日，刚好周六 —— 需要查一下）。
      黄昏：天狗山缆车夜景。
    activities:
      - id: day-14-otaru-canal
        place: { ref: otaru-canal }
      - id: day-14-music-box
        place: { ref: otaru-music-box-museum }
      - id: day-14-uomasa
        start: "11:40"
        place: { ref: uomasa-otaru }
        notes_zh: >-
          不接受预订，周日休。开门前 20 – 30 分钟到门口排队更稳。
          ⚠️ 日程确认：2027-01-09 是周六，开门。若临时改到 2027-01-10（周日）则改去其他店。
      - id: day-14-tengu-night
        start: "17:00"
        place: { ref: otaru-tengu-ropeway }
        notes_zh: 北海道三大夜景之一。日落后上山。冬季营业 09:00 – 20:00，末班上行 19:48。

  - id: day-15
    date: "2027-01-10"
    city: hokkaido
    title_zh: 第 15 天 · 小樽 朝里 航拍日
    intro_zh: >-
      ★ 整天留给 朝里 航拍 + 自拍摄影。主目标：朝里スカイループ（札樽道环形高架）。
      附近朝里ダム、朝里川温泉 做备选取景。天气不好改走纯地面自拍备用方案。
      ⚠️ 无人机规定详见 place notes（DID、高速上空禁飞、国定公园等）。
      当晚入住 Hotel Neuschloss 小樽（祝津海岸），明早起床看海。
    activities:
      - id: day-15-asari-drone
        place: { ref: asari-otaru }
        notes_zh: 至少留一天备用于天气窗口；飞行日前 ≥ 10 工作日 完成 DIPS 2.0 申请（若进入 DID）。

  - id: day-16
    date: "2027-01-11"
    city: hokkaido
    title_zh: 第 16 天 · 祝津 → 札幌
    intro_zh: >-
      早上享受 Neuschloss 海景 + 温泉 + 早餐。上午逛小樽水族館（就在酒店隔壁）。
      中午退房开到札幌（~40 km / 45 分钟），下午北海道大学散步，黄昏 白色恋人公园 看工厂 + 亮灯。
    activities:
      - id: day-16-otaru-aquarium
        place: { ref: otaru-aquarium }
      - id: day-16-drive-to-sapporo
        place: { ref: sapporo-station }
      - id: day-16-hokudai
        place: { ref: hokkaido-university }
        notes_zh: 札幌駅 北口步行 5 – 10 分钟即到校园。
      - id: day-16-shiroi-koibito
        start: "15:00"
        place: { ref: shiroi-koibito-park }
        notes_zh: 工厂 10:00 – 18:00，付费区最后入园 16:30。亮灯 16:00 – 19:00，看完日落直接出来吃晚饭。

  - id: day-17
    date: "2027-01-12"
    city: hokkaido
    title_zh: 第 17 天 · 札幌
    intro_zh: >-
      札幌第二天。早上 二条市場 海鲜丼；中午 ROYCE' 小镇或 頭大仏（需要选其一，两者离市中心方向相反）；
      黄昏 大倉山展望台 看日落；晚餐 蟹本家 或 NANDA（其中一个，提前预订）。
      Nice-to-have：藻岩山 夜景（如果 Day 14 天狗山看过后还想再刷一次）。
      Day 17 晚上 还车（或明早一早还车）。
    activities:
      - id: day-17-nijo-market
        place: { ref: nijo-market-sapporo }
      - id: day-17-hill-of-the-buddha
        place: { ref: hill-of-the-buddha }
        notes_zh: 冬季拜观 10:00 – 15:00；水庭冬季放空无反射，景色变成佛首 + 白雪。
      - id: day-17-okurayama
        place: { ref: okurayama-observatory }
      - id: day-17-kani-honke
        start: "18:30"
        place: { ref: kani-honke-sapporo }
        notes_zh: 4 人提前 2 – 3 周预订。

  # ─────────────────── Phase 3: Tokyo ───────────────────
  - id: day-18
    date: "2027-01-13"
    city: tokyo
    title_zh: 第 18 天 · 札幌 → 东京（转移日）
    intro_zh: >-
      上午还车，札幌駅乘 JR 特急 北斗 → 新函馆北斗（~3.5 小时）+ 北海道新干线 → 东京（~4 小时）。
      总计约 8 小时 + 换乘；Phase 3 首晚晚上在东京涩谷入住。
    activities:
      - id: day-18-sapporo-depart
        start: "08:30"
        place: { ref: sapporo-station }
      - id: day-18-tokyo-arrive
        place: { ref: shibuya-scramble }
        notes_zh: 入住涩谷基地。晚上近处随便吃。

  - id: day-19
    date: "2027-01-14"
    city: tokyo
    title_zh: 第 19 天 · 涩谷购物 + 按摩
    activities:
      - id: day-19-shibuya-shopping
        place: { ref: shibuya-scramble }
        notes_zh: 表参道 / 原宿 / Scramble Square / Miyashita Park 自由行。
      - id: day-19-massage
        start: "19:00"
        place: { ref: mominotakumi-shibuya }
        notes_zh: 60 分钟全身 ¥3,980。线上提前预约时段。

  - id: day-20
    date: "2027-01-15"
    city: tokyo
    title_zh: 第 20 天 · 东雲 AUTOBACS + 剪发
    activities:
      - id: day-20-autobacs
        start: "10:00"
        place: { ref: a-pit-autobacs-shinonome }
        notes_zh: ★ 用户要求至少 2 小时；按半天档排。りんかい線 東雲駅 步行 10 分钟。
      - id: day-20-haircut
        start: "15:00"
        place: { ref: star-tokyo-k-two-shibuya }
        notes_zh: K-two 需提前 ≥ 2 周预约；回程顺路回涩谷基地。

  - id: day-21
    date: "2027-01-16"
    city: tokyo
    title_zh: 第 21 天 · 三鹰 Subaru + 根津 + 权八晚餐
    intro_zh: >-
      2027-01-16 是周六 —— Subaru Mitaka 开门（只在周二、周三休）。白天车迷行程，晚上 Gonpachi。
    activities:
      - id: day-21-subaru-mitaka
        start: "10:30"
        place: { ref: tokyo-subaru-mitaka }
        notes_zh: ⚠️ 周二周三休，本日周六开门。中央线 三鷹駅 + 公交。
      - id: day-21-nezu-museum
        place: { ref: nezu-museum }
        notes_zh: 回表参道区途中，看东亚古代艺术品，呼应用户对「古代遗产」的兴趣。
      - id: day-21-gonpachi
        start: "19:30"
        place: { ref: gonpachi-nishiazabu }
        notes_zh: Kill Bill 原型居酒屋。4 人 2 小时席，提前 1 – 2 周预订。

  - id: day-22
    date: "2027-01-17"
    city: tokyo
    title_zh: 第 22 天 · 大江户骨董市 + 丸之内
    intro_zh: >-
      2027-01-17 是第 3 周日 —— ★ 大江户骨董市 在东京国际论坛户外广场 09:00 – 16:00 开市，
      约 250 家古董商；这是本次旅行接触「公开骨董」的最好固定机会。
    activities:
      - id: day-22-oedo-antique
        start: "09:30"
        place: { ref: oedo-antique-market }
        notes_zh: 户外市集；雨雪天可能取消，前一天查官网 antique-market.jp。
      - id: day-22-marunouchi
        place: { ref: meiji-shrine }
        notes_zh: 下午可选：明治神宫（初詣期） 或 丸之内区漫步 + 看下拍卖预展（毎日 / Shinwa / 东京中央 等 —— 根据 1 月中旬当月档期）。

  - id: day-23
    date: "2027-01-18"
    city: tokyo
    title_zh: 第 23 天 · 返程
    intro_zh: 按航班时间整理行李，前往 羽田 / 成田。注意元旦后 1 月中旬的机场通关仍可能繁忙，提前到达。
    activities:
      - id: day-23-haneda-depart
        place: { ref: haneda-airport }
