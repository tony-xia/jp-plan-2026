days:
  # ─────────────────── Phase 1 ───────────────────
  - id: day-01
    date: "2026-12-27"
    city: karuizawa
    title_zh: 第 1 天 · 抵达日本 · 新干线至轻井泽取车
    intro_zh: >-
      早上全员抵达羽田机场会合；从羽田转至东京站，换乘北陆新干线到 軽井沢駅，
      在 軽井沢駅 附近租车行取车（★ 不在羽田取车）后开往住宿。
    activities:
      - id: day-01-haneda-arrival
        start: "09:00"
        place: { ref: haneda-airport }
        notes_zh: 所有人早上抵达羽田机场集合；检查行李后前往东京站。
      - id: day-01-tokyo-station-transit
        place: { ref: tokyo-station }
        notes_zh: 羽田 → 东京站约 30 分钟（单轨 + JR 山手线 或 京急 + JR）；在东京站换乘北陆新干线「あさま / はくたか」。
      - id: day-01-karuizawa-arrival-rental
        place: { ref: karuizawa-station }
        notes_zh: >-
          抵达 軽井沢駅（东京站出发约 70 – 90 分钟）。
          ★ 在 軽井沢駅 附近租车行取车（Phase 1 租车点）—— 用户 2026-04-20 明确：不在羽田取车。
          取车后自驾前往住宿地。

  - id: day-02
    date: "2026-12-28"
    city: karuizawa
    title_zh: 第 2 天
    activities:
      - id: day-02-norikura-info-stop
        place: { ref: norikura-info-center }
        notes_zh: 前往皮波洛乗鞍的路上短暂停留，补给饮水、吃点东西。
    bookings:
      - id: day-02-peepolo-norikura
        kind: hotel
        title_zh: "住宿：皮波洛乗鞍（待确认）"
        start: "2026-12-28"
        end: "2026-12-29"
        address:
          full:
            zh: 长野县松本市安昙 4306（邮编 390-1513）
            ja: 〒390-1513 長野県松本市安曇4306
        googleMapsUrl: https://maps.app.goo.gl/pvGbjzcmBPzgbhno8
        details_zh: >-
          《恋爱世纪》女主角理子家的取景地，房间极少、非常抢手、价格较高。
          需订到 2 间房；日期可视全程安排调整。

  - id: day-03
    date: "2026-12-29"
    city: karuizawa
    title_zh: 第 3 天 · 车山高原 + 高原教会 + 下午还车
    intro_zh: >-
      ★ Phase 1 最后一个有车日 —— 上午 / 中午前开车跑车山高原；午后返程顺路停 軽井沢高原教会；
      下午回到预定还车地点（近住宿步行可达）完成还车。day 04 清早直接拉行李到 軽井沢駅 换乘北陆新干线出发（长途移动日）。
    activities:
      - id: day-03-kurumayama
        place: { ref: kurumayama-skypark }
        notes_zh: 不滑雪，乘缆车上车山山顶看雪景与八岳 / 富士山 / 阿尔卑斯山脉全景。上午出发，确保下午有时间回轻井泽还车。
      - id: day-03-karuizawa-kogen-church
        place: { ref: karuizawa-kogen-church }
        notes_zh: >-
          车山高原下山回轻井泽途中顺路停 星野度假区内的历史教会。2026-04-20 从 day-04 移来 ——
          因 day-04 整天是 轻井泽 → 函馆 的新干线移动日，不再有时间在 轻井泽 内活动。趁车还在今天先看。
      - id: day-03-car-return
        start: "17:00"
        place: { ref: karuizawa-station }
        notes_zh: >-
          ★ Phase 1 租车还车 —— 軽井沢駅 附近租车行，选步行可达住宿的分店；否则预约出租回住宿。
          时间定在傍晚，Kurumayama + 高原教会 跑完后交车。还车后晚上留在住宿整理行李。

  # ─────────────────── Phase 2: Hokkaido ───────────────────
  - id: day-04
    date: "2026-12-30"
    city: hokkaido
    title_zh: 第 4 天 · 轻井泽 → 函馆（长途移动日）
    intro_zh: >-
      ★ 全天移动日（用户 2026-04-20 明确）：早上从 轻井泽 Airbnb 叫 Uber / 出租车到 軽井沢駅（已无租车）→ 乘 北陆新干线 →
      东京站 站内换乘 東北・北海道新幹線「はやぶさ」→ 新函館北斗駅 → 换 JR 函館ライナー → 函馆駅。
      车程合计 6 – 7 小时 + 换乘缓冲，门到门约 8 小时。不安排观光，傍晚抵达函馆办理入住。
      ⚠️ 4 人 + 冬装 + 行李量大：務必预约 東北・北海道新干线「はやぶさ」的「特大荷物スペースつき座席」（大件行李指定席），元旦前后热门，早订。
    activities:
      - id: day-04-depart-karuizawa
        start: "08:30"
        place: { ref: karuizawa-station }
        notes_zh: >-
          ★ 用户确认（2026-04-20）：day-03 已还车，今早从 Airbnb 叫 Uber 或出租车拉行李到 軽井沢駅（轻井泽市区 Uber 覆盖有限，建议事先让房东备一个本地出租电话作为后备）。
          抵达后换乘 北陆新干线 「あさま / はくたか」 前往 东京站（约 70 – 90 分钟）。
      - id: day-04-tokyo-transfer
        place: { ref: tokyo-station }
        notes_zh: >-
          东京站站内换乘 東北・北海道新幹線「はやぶさ」前往 新函館北斗。
          北陆新干线 23 – 24 番线 ↔ 东北/北海道新干线 20 – 23 番线，同层过街，换乘 ~15 分钟；
          有大行李务必预留 30 分钟缓冲，建议提前订好换乘班次，避开太紧的接驳。
      - id: day-04-shin-hakodate-hokuto
        place: { ref: shin-hakodate-hokuto-station }
        notes_zh: >-
          东京 → 新函館北斗 新干线单程约 4 小时。抵达后下新干线，站内换 JR 函館ライナー，约 15 – 20 分钟到 函馆駅。
      - id: day-04-hakodate-arrival
        place: { ref: hakodate-station }
        notes_zh: 抵达函馆（预计傍晚 / 入夜），办理酒店入住。今晚简单吃点，早休息 —— 跨年夜看 day-05。
    bookings:
      - id: day-04-shinkansen-karuizawa-hakodate
        kind: shinkansen
        title_zh: "新干线：轻井泽 → 东京 → 新函館北斗 → 函馆（3 段）"
        start: "2026-12-30"
        from:
          zh: 轻井泽站
          en: Karuizawa Station
          ja: 軽井沢駅
        to:
          zh: 函馆站
          en: Hakodate Station
          ja: 函館駅
        details_zh: >-
          3 段行程：① 軽井沢 → 东京（北陆新幹線 あさま / はくたか，~70 – 90 分）；
          ② 东京 → 新函館北斗（東北・北海道新幹線 はやぶさ，~4 小时）；
          ③ 新函館北斗 → 函馆（JR 函館ライナー，~15 – 20 分）。
          ★ 务必同时预约 ②「はやぶさ」特大荷物スペースつき座席（大行李指定席）—— 2020 年起强制，
          元旦前后几乎必售罄，需尽早。三段行程理想上一次预订，JR East / JR Hokkaido 网站或绿色窗口。

  - id: day-05
    date: "2026-12-31"
    city: hokkaido
    title_zh: 第 5 天 · 跨年夜 · 函馆
    intro_zh: >-
      函馆白日 + 跨年夜。昨晚长途移动后，今天在函馆休整+游览：早上朝市海鲜丼；
      白天元町坂 + 红砖仓库；傍晚视精力挑一个时段吃跨年大餐。
    activities:
      - id: day-05-hakodate-day
        place: { ref: hakodate-station }
        notes_zh: 以函馆駅为中心活动：朝市（海鲜丼）、元町坂、金森红砖仓库、湯の川 / ベイエリア。跨年晚上留在函馆。

  - id: day-06
    date: "2027-01-01"
    city: hokkaido
    title_zh: 第 6 天 · 元旦 · 函馆山夜景
    intro_zh: >-
      元旦白日函馆自由活动；黄昏前上 函馆山 看日落接百万夜景（冬季只能缆车）。
    activities:
      - id: day-06-mt-hakodate
        start: "16:30"
        place: { ref: mt-hakodate-observatory }
        notes_zh: >-
          冬季禁止汽车 / 巴士 / 出租上山，只能缆车。日落约 16:20；提前到山麓站排缆车。
          保暖必备（厚外套、围巾、手套、帽子）。

  - id: day-07
    date: "2027-01-02"
    city: hokkaido
    title_zh: 第 7 天 · 函馆 → 札幌（顺时针自驾环线 · 札幌夜 1）
    intro_zh: >-
      ★ 2026-04-20 大改 · 顺时针路线起点：上午 JR 特急 北斗 函馆 → 札幌（~3 小时 30 分）。
      下午抵达札幌、入住市中心酒店。傍晚黄金时段去 白色恋人公园 看工厂 + 亮灯（16:00 – 19:00），
      晚餐 蟹本家 札幌站本店。今晚是札幌 3 晚中的第 1 晚（车还没取）。
    activities:
      - id: day-07-hakodate-to-sapporo
        start: "09:00"
        place: { ref: sapporo-station }
        notes_zh: JR 特急 北斗 函馆 → 札幌 ~3 小时 30 分。预留大行李指定席。
      - id: day-07-shiroi-koibito
        start: "15:00"
        place: { ref: shiroi-koibito-park }
        notes_zh: 工厂 10:00 – 18:00，付费区最后入园 16:30。亮灯 16:00 – 19:00，看完日落直接出来吃晚饭。
      - id: day-07-kani-honke
        start: "18:30"
        place: { ref: kani-honke-sapporo }
        notes_zh: 4 人提前 2 – 3 周预订。和 NANDA 二选一今晚。
    bookings:
      - id: day-07-hokuto-hakodate-sapporo
        kind: other
        title_zh: "JR 特急 北斗：函馆 → 札幌"
        start: "2027-01-02"
        from: { zh: 函馆站, en: Hakodate Station, ja: 函館駅 }
        to: { zh: 札幌站, en: Sapporo Station, ja: 札幌駅 }
        details_zh: ~3 小时 30 分。4 人 + 冬装行李 → 预约特大荷物指定席。

  - id: day-08
    date: "2027-01-03"
    city: hokkaido
    title_zh: 第 8 天 · 札幌核心日（夜 2）· 北大 + 二条 + 頭大仏 + 大倉山
    intro_zh: >-
      札幌完整一天（车还没取，全程地铁 / 巴士 / 出租）。
      早上 二条市場 海鲜丼；上午 北海道大学 校园散步；下午 頭大仏（地铁 + 中央巴士 真108，往返 ~2 小时）；
      黄昏 大倉山 展望台看日落；晚餐 NANDA 海鲜自助 或自由。
    activities:
      - id: day-08-nijo-market
        start: "08:30"
        place: { ref: nijo-market-sapporo }
        notes_zh: 早市开到中午前；海鲜丼当早饭。
      - id: day-08-hokudai
        place: { ref: hokkaido-university }
        notes_zh: 札幌駅 北口步行 5 – 10 分钟即到校园。
      - id: day-08-hill-of-the-buddha
        place: { ref: hill-of-the-buddha }
        notes_zh: 冬季拜观 10:00 – 15:00；水庭冬季放空无反射，景色变成佛首 + 白雪。
      - id: day-08-okurayama
        place: { ref: okurayama-observatory }
        notes_zh: 1972 冬奥跳台场地；双人吊椅上展望台看日落。
      - id: day-08-nanda
        start: "19:30"
        place: { ref: seafood-buffet-nanda }
        notes_zh: 和昨晚蟹本家二选一；提前 2 – 3 周预约。

  - id: day-09
    date: "2027-01-04"
    city: hokkaido
    title_zh: 第 9 天 · ROYCE' 小镇 + 藻岩山夜景（札幌夜 3）
    intro_zh: >-
      白天 JR 学园都市线 去 ロイズタウン駅 做巧克力工厂体验（必提前官网 e-tix 预约）；
      黄昏 / 夜 藻岩山 夜景（完成北海道三大夜景之一，与 函館山 + 天狗山 组齐）。
      晚餐随意。明早取车开始自驾环线。
    activities:
      - id: day-09-royce-town
        start: "11:00"
        place: { ref: royce-cacao-chocolate-town }
        notes_zh: >-
          ★ 必须提前在官网 e-tix 预约；10:00 – 17:00，最后入场 15:00。
          从 札幌駅 → ロイズタウン駅（学园都市线）约 30 分钟，非自驾出行。
      - id: day-09-moiwa
        start: "16:30"
        place: { ref: mt-moiwa-ropeway }
        notes_zh: >-
          北海道三大夜景之三。冬季 11:00 – 22:00，末班上行 21:30。
          1/4（周一）非年末年始，正常营业；出行前再确认。

  - id: day-10
    date: "2027-01-05"
    city: hokkaido
    title_zh: 第 10 天 · 札幌取车 → 稚内（长途日）
    intro_zh: >-
      ★ 顺时针环线第 1 天（长途）：早上札幌市区租车行取车，然后一路北上开到稚内
      （~330 km / 冬季 5 – 6 小时 · 道央道 + R40）。
      中午在岩见沢 / 旭川 吃午饭；傍晚抵达 Surfeel 入住。
      体力充沛再加 ノシャップ岬 日本海夕阳（晴天能看见利尻富士）；否则休整为明天的宗谷岬做准备。
    activities:
      - id: day-10-sapporo-pickup
        start: "09:00"
        place: { ref: sapporo-station }
        notes_zh: 札幌市区租车行取车（站前 / 薄野），出发时间决定当日行程。
      - id: day-10-drive-to-wakkanai
        place: { ref: surfeel-hotel-wakkanai }
        notes_zh: 札幌 → 稚内 道央道 + R40，冬季估 5 – 6 小时；傍晚到酒店办理入住。
      - id: day-10-noshappu-cape
        place: { ref: noshappu-cape }
        notes_zh: 如到得早有余力，黄昏跑一趟 ノシャップ岬 看日本海夕阳。否则跳过。

  - id: day-11
    date: "2027-01-06"
    city: hokkaido
    title_zh: 第 11 天 · 宗谷岬 → 鄂霍次克海岸 → 网走（超长途日）
    intro_zh: >-
      🚨 顺时针环线最硬一天：早上 宗谷岬（日本最北端）→ R238 沿鄂霍次克海岸一路东南到网走
      （宗谷岬 → 网走 ~330 km，加稚内 → 宗谷岬 ~30 km 绕行，总 ~380 – 400 km，冬季 6 – 7 小时）。
      ★ 左侧驾驶 + 向东行驶 = 海在驾驶员一侧，这是顺时针路线的核心体验。
      中途 音威子府 / 枝幸 / 雄武 / 紋別 / サロマ湖 可以短停；遇暴风 / 白化走 R40 → 旭川 → R39 内陆备案（放弃海景）。
    activities:
      - id: day-11-cape-soya
        start: "08:30"
        place: { ref: cape-soya }
        notes_zh: 日本最北端纪念碑；稚内冬季风暴大，出发前查天气 + 道路封闭信息。
      - id: day-11-drive-to-abashiri
        place: { ref: abashiri-city }
        notes_zh: R238 沿鄂霍次克海岸东南行；傍晚抵达网走入住。

  - id: day-12
    date: "2027-01-07"
    city: hokkaido
    title_zh: 第 12 天 · 网走 + 知床方向全天
    intro_zh: >-
      网走全天。上午 オホーツク流氷館（-15℃ 室内真冰 · 我们窗口海面流氷可能未到的替代）+ 天都山展望台；
      下午跑 能取岬 → 天に続く道（斜里町，冬季保留观察路况）→ オシンコシン滝 → 鱒浦 ビューポイント 回程。
    activities:
      - id: day-12-ryuhyo-museum
        place: { ref: okhotsk-ryuhyo-museum }
        notes_zh: 流氷未到时这里是真冰替代体验的首选。
      - id: day-12-cape-notoro
        place: { ref: cape-notoro }
        notes_zh: 冬日鄂霍次克海岸；天气好时非常出片。
      - id: day-12-road-to-heaven
        place: { ref: road-to-heaven-shari }
        notes_zh: >-
          冬季注意事项：起点观景台冬季关闭；道路只有 2 月才保证除雪。当日实地观察再决定是否驾入。
      - id: day-12-oshinkoshin
        place: { ref: oshinkoshin-falls }
        notes_zh: 部分结冰的大瀑布，回程顺路。
      - id: day-12-masuura
        place: { ref: masuura-viewpoint-parking }
        notes_zh: 回网走前最后一个观景停车带。

  - id: day-13
    date: "2027-01-08"
    city: hokkaido
    title_zh: 第 13 天 · 网走 → 美瑛（蓝池 + 亮灯夜）
    intro_zh: >-
      网走 → 美瑛 ~220 km，冬季 4 – 5 小时（高速线走 R39 → 道央道）。
      午餐旭川；下午入住美瑛酒店；日落前到 白金青い池 蹲标准 17:00 亮灯（~10 分钟循环灯光 pattern，~21:00 结束）。
    activities:
      - id: day-13-drive-to-biei
        place: { ref: abashiri-city }
        notes_zh: 早出，午餐旭川 / 上富良野；下午抵美瑛酒店。
      - id: day-13-blue-pond
        start: "16:00"
        place: { ref: shirogane-blue-pond }
        notes_zh: >-
          冬季日落后亮灯到 21:00（1 月 ~17:00 开始），日落前 1 小时到位先拍日景 → 接亮灯一次看齐。
          带三脚架长曝。

  - id: day-14
    date: "2027-01-09"
    city: hokkaido
    title_zh: 第 14 天 · 美瑛丘陵 → 小樽（鱼真午餐 · 运河 · 天狗山夜）
    intro_zh: >-
      ★ 小樽 3 晚的第 1 晚（中心街）。上午美瑛丘陵两棵树（クリスマスツリー + セブンスター）；
      然后开到小樽（~200 km / 冬季 3 – 4 小时 · 旭川 → 道央道）。
      ⚠️ 2027-01-09 是周六 —— 鱼真开门，不接受预订。开门前 20 – 30 分钟排队；
      赶得上就午餐鱼真，赶不上改小樽市区其它寿司。下午 运河 + 音乐盒堂 + 堺町通り；日落后 天狗山 夜景。
    activities:
      - id: day-14-christmas-tree
        start: "08:00"
        place: { ref: biei-christmas-tree }
        notes_zh: ⚠️ 无停车场 + 私人农地，路边取景即走，绝不踏入田地。
      - id: day-14-seven-stars-tree
        place: { ref: biei-seven-stars-tree }
        notes_zh: 有停车场，比 クリスマスツリー 好停。
      - id: day-14-drive-to-otaru
        place: { ref: otaru-canal }
        notes_zh: 美瑛 → 小樽 旭川 → 道央道 → 札樽道；冬季估 3 – 4 小时。
      - id: day-14-uomasa
        start: "13:30"
        place: { ref: uomasa-otaru }
        notes_zh: >-
          不接受预订，周日休。2027-01-09 周六开门。到达时间不稳定；
          如果 13:00 之前能到小樽就午餐鱼真，否则直接放弃改晚饭 / 运河边店。
      - id: day-14-music-box
        place: { ref: otaru-music-box-museum }
        notes_zh: 堺町本通り尽头；顺带逛 LeTAO / 玻璃店。
      - id: day-14-tengu-night
        start: "17:00"
        place: { ref: otaru-tengu-ropeway }
        notes_zh: >-
          北海道三大夜景之一。日落后上山。冬季营业 09:00 – 20:00，末班上行 19:48。

  - id: day-15
    date: "2027-01-10"
    city: hokkaido
    title_zh: 第 15 天 · Rusutsu 双线环游（中山峠 + ニセコ）
    intro_zh: >-
      ★ 2026-04-20 用户新加：开车去 Rusutsu 留寿都，去程和回程走不同路看不同雪景。
      去 中山峠（R230，羊蹄山 + あげいも）→ Rusutsu 中午午餐 / 雪上活动 → 回 ニセコ + R5 余市沿海 → 小樽。
      ~7 – 9 小时循环；根据天气 / 光线可反向（ニセコ 去，中山峠 回程日落）。
    activities:
      - id: day-15-nakayama-toge
        start: "09:30"
        place: { ref: nakayama-toge }
        notes_zh: Rusutsu 循环去程必停点；羊蹄山 + 名产「あげいも」。
      - id: day-15-rusutsu
        start: "11:00"
        place: { ref: rusutsu-resort }
        notes_zh: 度假村基地午餐 + 雪上活动 + 散步。~15:00 出发走 ニセコ 回程。
      - id: day-15-return-to-otaru
        place: { ref: otaru-canal }
        notes_zh: 回小樽 ~17:30 – 18:00；若有余力再刷一遍运河夜景。

  - id: day-16
    date: "2027-01-11"
    city: hokkaido
    title_zh: 第 16 天 · 朝里 航拍 + 祝津 · Neuschloss 夜
    intro_zh: >-
      ★ 上午 / 中午 朝里 航拍 + 自拍摄影（主目标 朝里スカイループ；备选 朝里ダム / 朝里川温泉）。
      下午到 祝津 小樽水族館。当晚入住 Hotel Neuschloss 小樽（祝津海岸、全海景、私人露天风吕、法式晚餐）。
      ⚠️ 无人机规定详见 place notes（DID、高速上空禁飞、国定公园等）；≥ 10 工作日前提交 DIPS 2.0 申请。
      天气不好改纯地面自拍 / 余市 Nikka 威士忌 工厂 备案。
    activities:
      - id: day-16-asari-drone
        start: "09:30"
        place: { ref: asari-otaru }
        notes_zh: 这是整个行程唯一的航拍窗口 —— 没有天气备用日。天气不行就只拍地面。
      - id: day-16-otaru-aquarium
        place: { ref: otaru-aquarium }
        notes_zh: 祝津海岸，紧邻 Neuschloss；冬季程序含海狮 / 企鹅秀。入住 Hotel Neuschloss 的详情见 phase2-otaru-neuschloss booking。

  - id: day-17
    date: "2027-01-12"
    city: hokkaido
    title_zh: 第 17 天 · 祝津 → 札幌还车 → 洞爷 Windsor
    intro_zh: >-
      ★ 顺时针环线收尾：早 Neuschloss 早餐 + 温泉；上午退房，从祝津开到札幌市区租车行还车
      （~40 km / 45 分钟）。步行 / 出租到 札幌駅，乘 JR 特急 北斗 → 洞爺駅（~2 小时），
      配合 Windsor 免费接驳巴士发车时间（建议 13:00 / 14:20 / 16:55 其一）。
      ★ 前一天 18:00 前 从 Neuschloss 那边电话预约接驳。
    activities:
      - id: day-17-drive-to-sapporo-dropoff
        start: "10:00"
        place: { ref: sapporo-station }
        notes_zh: 祝津 → 札幌市区租车行还车；步行到札幌駅上车。
      - id: day-17-toya-station
        place: { ref: toya-station }
        notes_zh: JR 洞爺駅 下车，候 Windsor 接驳巴士（约 40 分钟车程到酒店）。
    bookings:
      - id: day-17-hokuto-sapporo-toya
        kind: other
        title_zh: "JR 特急 北斗：札幌 → 洞爺"
        start: "2027-01-12"
        from: { zh: 札幌站, en: Sapporo Station, ja: 札幌駅 }
        to: { zh: 洞爺站, en: Toya Station, ja: 洞爺駅 }
        details_zh: ~2 小时。还车后发车，配合 Windsor 接驳时刻。

  - id: day-18
    date: "2027-01-13"
    city: hokkaido
    title_zh: 第 18 天 · Lake Toya 环湖一日（Phase 2 最后一夜）
    intro_zh: >-
      Windsor 住宿第 2 晚、Phase 2 最后一夜。上午 / 下午借酒店班车或打车跑 Silo 展望台 + 有珠山缆车；
      如时间 + 体力允许，下午加 登别地狱谷（开车 40 – 50 分钟）。
      今晚好好享受 Windsor（SPA、晚餐、湖景）；明早（day-19）收拾行李去东京。
    activities:
      - id: day-18-silo
        place: { ref: toyako-silo-observation-deck }
        notes_zh: 洞爷湖全景免费展望台；冬季营业 8:30 – 17:00。
      - id: day-18-usuzan
        place: { ref: usuzan-ropeway }
        notes_zh: 有珠山缆车上山顶；走到火口原展望台约 7 分钟。冬季外輪山遊歩道封闭。
      - id: day-18-noboribetsu
        place: { ref: noboribetsu-jigokudani }
        notes_zh: 时间允许，下午加 登别地狱谷；傍晚回酒店。

  # ─────────────────── Phase 3: Tokyo ───────────────────
  - id: day-19
    date: "2027-01-14"
    city: tokyo
    title_zh: 第 19 天 · 洞爷 → 东京（转移日）
    intro_zh: >-
      ★ 顺时针重构后：上午 Windsor 退房，班车到 洞爺駅。JR 特急 北斗 → 新函馆北斗（~2.5 小时）→
      北海道新干线 はやぶさ → 东京（~4 小时）。合计 ~7 小时 + 换乘，略短于旧的札幌直发。
      Phase 3 首晚晚上在东京涩谷入住。
    activities:
      - id: day-19-toya-depart
        start: "09:00"
        place: { ref: toya-station }
        notes_zh: Windsor 早班车到 洞爺駅；前一晚需预约。
      - id: day-19-tokyo-arrive
        place: { ref: shibuya-scramble }
        notes_zh: 入住涩谷基地。晚上近处随便吃。
    bookings:
      - id: day-19-toya-tokyo-rail
        kind: shinkansen
        title_zh: "特急北斗 + 北海道新干线：洞爷 → 新函馆北斗 → 东京"
        start: "2027-01-14"
        from: { zh: 洞爺站, en: Toya Station, ja: 洞爺駅 }
        to: { zh: 东京站, en: Tokyo Station, ja: 東京駅 }
        details_zh: >-
          ① 特急 北斗 洞爺 → 新函館北斗 ~2.5 小时；② 北海道新干线 はやぶさ 新函館北斗 → 东京 ~4 小时。
          预约大行李指定席（はやぶさ 必须）。

  - id: day-20
    date: "2027-01-15"
    city: tokyo
    title_zh: 第 20 天 · 车迷日 1 —— Subaru 双店（惠比寿旗舰 + 三鹰店）+ 涩谷购物 + 按摩（周五）
    intro_zh: >-
      2027-01-15 是周五 —— Subaru Mitaka 开门（周二 / 周三休）。东京 5 晚的第一个完整日定为 Subaru 车迷日：
      早上先逛 惠比寿 Garden Place 的 Subaru 品牌旗舰展厅「SUBARU 星广场」，之后赴 三鹰 经销旗舰店。
      回涩谷补一段购物，晚上 もみの匠 按摩收尾。
    activities:
      - id: day-20-subaru-star-square
        start: "10:30"
        place: { ref: subaru-star-square-ebisu }
        notes_zh: >-
          品牌旗舰展厅，非经销店；涩谷 → 惠比寿 1 站即到（JR 山手线 ~3 分钟）。
          预估 60 – 90 分钟；出行前确认开放时间 / 是否需要预约。
      - id: day-20-subaru-mitaka
        start: "13:00"
        place: { ref: tokyo-subaru-mitaka }
        notes_zh: >-
          ⚠️ 周二 / 周三休，本日周五开门（10:00 – 18:00）。
          从 惠比寿 乘 JR 山手线 → 新宿 → 中央线 三鷹駅，再公交/出租 15 分钟；或打车 ~30 – 40 分钟。
          逛展厅 + 隔壁 G-PARK 三鷹 中古车店，预估 90 – 120 分钟。
      - id: day-20-shibuya-shopping
        start: "16:30"
        place: { ref: shibuya-scramble }
        notes_zh: 回涩谷后自由购物：表参道 / 原宿 / Scramble Square / Miyashita Park。压缩到傍晚时段。
      - id: day-20-massage
        start: "20:00"
        place: { ref: mominotakumi-shibuya }
        notes_zh: 60 分钟全身 ¥3,980。线上提前预约时段；Subaru 日跑动多，晚上按摩合适。

  - id: day-21
    date: "2027-01-16"
    city: tokyo
    title_zh: 第 21 天 · 车迷日 2 —— A PIT 东雲 Autobacs + 权八晚餐（周六）
    intro_zh: >-
      2027-01-16 是周六 —— 东京 5 晚的第二个完整日定为 Autobacs 车迷日。上午/中午在 A PIT 东雲 超级汽配
      留足 ≥ 2 小时；下午有时间的话回表参道区顺访根津美术馆；晚上 Gonpachi 收官。
    activities:
      - id: day-21-autobacs
        start: "10:00"
        place: { ref: a-pit-autobacs-shinonome }
        notes_zh: >-
          ★ 用户要求至少 2 小时。全年 9:00 – 22:00 营业；24 小时停车。
          りんかい線 東雲駅 步行 10 分钟；从涩谷 约 30 – 40 分钟（地铁 / 车）。
          预算 10:00 – 13:00，含挑高中庭星巴克午饭 + 汽车杂志 TSUTAYA。
      - id: day-21-nezu-museum
        start: "15:00"
        place: { ref: nezu-museum }
        notes_zh: 时间允许的话回表参道区中途插入根津美术馆看东亚古美术 —— 与用户「古代遗产」兴趣共鸣。可跳过。
      - id: day-21-gonpachi
        start: "19:30"
        place: { ref: gonpachi-nishiazabu }
        notes_zh: Kill Bill 原型居酒屋。4 人 2 小时席，提前 1 – 2 周预订。

  - id: day-22
    date: "2027-01-17"
    city: tokyo
    title_zh: 第 22 天 · 大江户骨董市（周日）+ 剪发
    intro_zh: >-
      2027-01-17 是第 3 周日 —— ★ 大江户骨董市 在东京国际论坛户外广场 09:00 – 16:00 开市，
      约 250 家古董商。下午回涩谷剪发。车迷行程已于 day 20 – 21 完成，本日放松。
    activities:
      - id: day-22-oedo-antique
        start: "09:30"
        place: { ref: oedo-antique-market }
        notes_zh: 户外市集；雨雪天可能取消，前一天查官网 antique-market.jp。预算 09:30 – 13:30。
      - id: day-22-haircut
        start: "14:30"
        place: { ref: star-tokyo-k-two-shibuya }
        notes_zh: 周日 10:00 – 19:00 营业；提前 ≥ 2 周预约。

  - id: day-23
    date: "2027-01-18"
    city: tokyo
    title_zh: 第 23 天 · 返程
    intro_zh: 按航班时间整理行李，前往 羽田 / 成田。注意元旦后 1 月中旬的机场通关仍可能繁忙，提前到达。
    activities:
      - id: day-23-haneda-depart
        place: { ref: haneda-airport }
