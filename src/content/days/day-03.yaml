# Day 03 — 2026-12-29 — 函馆山夜景
day:
  id: day-03
  date: "2026-12-29"
  city: hokkaido
  title_zh: 第 3 天 · 函馆自由日 + 函馆山夜景
  intro_zh: >-
    白日自由：可去 五稜郭 公园 + 五稜郭塔、湯の川温泉、立待岬 / 函館公園，或继续补 元町 深度。
    核心活动在黄昏：日落前上 函馆山 看日落接百万夜景（冬季只能缆车）。明早乘 北斗 去札幌。
  activities:
    - id: day-03-free-morning
      place: { ref: hakodate-station }
      notes_zh: >-
        自由安排：推荐 五稜郭 公园 + 塔（函馆駅 市电 ~15 分 + 步行），或 湯の川温泉 泡汤。
        午餐可以塩ラーメン（函馆是盐味拉面发源）或回 金森 附近。
    - id: day-03-mt-hakodate
      start: "16:30"
      place: { ref: mt-hakodate-observatory }
      notes_zh: >-
        ⚠️ 冬季禁止汽车 / 巴士 / 出租上山，只能缆车。12 月底日落约 16:20；
        提前到山麓站排缆车（高峰期缆车 + 观景台都排队）。
        保暖必备：厚外套、围巾、手套、帽子、暖宝宝 —— 山顶风大温度比市区再低 5 – 8℃。
        ★ 日落 + 蓝调时刻 + 全黑夜景 3 段一气看完最值得；预计 17:00 上山，18:30 – 19:00 下山吃晚饭。
