  title_zh: 第 16 天 · Rusutsu 双线环游（中山峠 + ニセコ）
  intro_zh: >-
    ★ 开车去 Rusutsu 留寿都，去程和回程走不同路看不同雪景。
    去 中山峠（R230，羊蹄山 + あげいも）→ Rusutsu 中午午餐 / 雪上活动 → 回 ニセコ + R5 余市沿海 → 小樽。
    ~7 – 9 小时循环；根据天气 / 光线可反向（ニセコ 去，中山峠 回程日落）。
    ⚠️ 2027-01-10 是周日 —— 鱼真 休，午餐在 Rusutsu 度假村基地解决。
