# Day 05 — 2026-12-31 — 跨年夜 · 札幌
day:
  id: day-05
  date: "2026-12-31"
  city: hokkaido
  title_zh: 第 5 天 · 跨年夜 · 札幌（夜 2）
  intro_zh: >-
    ★ 用户选定：跨年夜在札幌。白日轻量活动，晚上留力在市中心跨年。
    上午 二条市場 海鲜丼当早饭 → 白天 大通公園 + 札幌电视塔 + 狸小路 / 薄野一带散步；
    黄昏 藻岩山 缆车日落 + 蓝调夜景（北海道三大夜景之一）→ 薄野跨年晚餐 → 大通跨年倒数。
    ⚠️ 大晦日很多餐厅提早打烊或停业，预订前务必逐家确认营业时间。
  activities:
    - id: day-05-nijo-market
      start: "08:30"
      place: { ref: nijo-market-sapporo }
      notes_zh: >-
        市场一般到中午前；早餐海鲜丼。
        ⚠️ 大晦日部分摊位提前关门，8 – 10 点时段最稳。
    - id: day-05-odori
      place: { ref: odori-park-tv-tower }
      notes_zh: >-
        白日散步大通公園 + 札幌电视塔（展望台可登）。大晦日 / 元旦附近可能有跨年倒计时活动 —— 出行前查 sapporo-tv-tower.co.jp 公告。
    - id: day-05-moiwa
      start: "15:30"
      place: { ref: mt-moiwa-ropeway }
      notes_zh: >-
        北海道三大夜景之一（我们 3 座已集齐：函馆山 day-03、藻岩山 today、天狗山 day-13 小樽）。
        冬季 12 – 3 月 11:00 – 22:00，末班上行 21:30。
        ⚠️ 年末年始（12/31 – 1/1）营业时间可能临时变动，出行前确认；
        大晦日日落约 16:10 —— 日落前 40 – 60 分钟上山，接连看日落 + 蓝调 + 全黑 3 段。
    - id: day-05-nye-dinner
      start: "19:30"
      place: { ref: seafood-buffet-nanda }
      notes_zh: >-
        薄野跨年晚餐首选。⚠️ 必提前 2 – 3 周预约；确认大晦日是否营业。
        如 NANDA 大晦日停业，备选：薄野拉面街 / 札幌 本家 蕎麦年越し（日本大晦日传统吃 年越しそば）。
