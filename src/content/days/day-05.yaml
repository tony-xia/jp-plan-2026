  title_zh: 第 5 天 · 自驾去美瑛（圣诞树 · 七星 · 青池）
  intro_zh: >-
    一整天自驾 · 札幌 → 美瑛 来回，去程走 道央道 经 旭川 南下进 美瑛 丘陵，
    回程沿原路返札幌。冬季日落早（~16:15），早点出门光线和路况都更舒服；午餐在 美瑛 或 旭川 找一家暖暖的店。
    主线景点：クリスマスツリーの木 → セブンスターの木 → 白金青い池。
    青池冬天有夜间 light-up —— 想等点灯就晚一点回札幌，看天气和当下心情决定。
    ⚠️ 冬季轮胎 + 雪链 是冬季自驾标配，出发前顺手查一下 北海道開発局 道路情報。
