# Day 10 — 2027-01-04 — 札幌 → 稚内（长途）
day:
  id: day-10
  date: "2027-01-04"
  city: hokkaido
  title_zh: 第 10 天 · 札幌 → 稚内（长途日）
  intro_zh: >-
    ★ 顺时针环线第 1 天（周一）：Sapporo 7 晚结束，早上从酒店 / 停车场取回停了一周的车，
    开始北上稚内（~330 km / 冬季 5 – 6 小时 · 道央道 + R40）。
    （车在 day-3 就取了，不需要再到租车行。）
    中午在 岩見沢 / 旭川 吃午饭；傍晚抵达 Surfeel 入住。
    今晚稚内 2 晚的第 1 晚（+1 晚作为天气缓冲）。体力允许再加 ノシャップ岬 日本海夕阳，否则休整为明天的 宗谷岬 做准备。
  activities:
    - id: day-10-sapporo-depart
      start: "08:30"
      place: { ref: sapporo-station }
      notes_zh: >-
        从停车场取回车，准备出发前最后一次检查：
        胎况 / 雨刮 / 雪链 / 燃油 / ETC 卡 / 紧急联络方式。
    - id: day-10-drive-to-wakkanai
      place: { ref: surfeel-hotel-wakkanai }
      notes_zh: >-
        札幌 → 稚内 道央道 + R40，冬季估 5 – 6 小时；午餐岩見沢 / 旭川；傍晚到酒店办理入住。
        ⚠️ 暴雪 / 道路封闭前查「北海道開発局 道路情報」。
    - id: day-10-noshappu-cape
      place: { ref: noshappu-cape }
      notes_zh: 如到得早有余力，黄昏跑一趟 ノシャップ岬 看日本海夕阳 + 利尻富士剪影。否则跳过留到明天。
