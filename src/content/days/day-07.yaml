# Day 07 — 2027-01-01 — 元旦 · 札幌（初日の出 + 初詣 + 北大）
day:
  id: day-07
  date: "2027-01-01"
  city: hokkaido
  title_zh: 第 7 天 · 元旦 · 初日の出 + 初詣 + 北海道大学（札幌夜 3）
  intro_zh: >-
    元旦日本传统三件套：**初日の出（2027 年第一道日光）→ 初詣（新年第一次参拜）→ 校园雪景散步**。
    清晨 6:00 前赶到 JR 札幌駅 顶楼 T38 展望室（元旦特别提早开门）迎接 ~7:00 日出；
    早餐后地铁到 円山公園 → 北海道神宮 初詣（9 点前到可避开 10 – 14 点高峰）；
    下午 北海道大学 校园冬景散步。
    ⚠️ 元旦当日大多数景点 / 餐厅 / 商店停业（商店一般 1/2 或 1/3 起陆续营业）。头大佛、大倉山、白い恋人 等都可能休园，
    这些景点放到 day-08（1/2 Sat）/ day-09（1/3 Sun）——  即 Sapporo 前段的两个空白日 —— 再补。
    晚上就近拉面 / 居酒屋 —— 薄野附近元旦开门的店家比景点多。
  activities:
    - id: day-07-hatsuhinode-t38
      place: { ref: jr-tower-t38 }
      notes_zh: >-
        ★ 元旦「初日の出」：JR 札幌駅 顶楼 T38 展望室 每年 1/1 约 6:00 特别提早开门。
        札幌元旦日出 ~7:00，建议 6:30 前到展望台占位（东南向窗户）。
        2027 年具体开门时间 + 初日の出票价出行前查 jr-tower.com 公告。
        备选：如 T38 元旦特别营业取消，改去 藻岩山 ロープウェイ 初日の出特别班（通常需预约，有付费包套餐）。
        日出后下山到 札幌駅 周边早餐 —— 车站内 エスタ / パセオ 元旦多数休，便利店 + 酒店早餐最稳。
    - id: day-07-hokkaido-jingu
      place: { ref: hokkaido-jingu }
      notes_zh: >-
        初詣（新年第一次参拜）。地铁 東西線 円山公園駅 步行 ~15 分钟。
        元旦人流高峰 10:00 – 14:00，9 点前到可相对避开最挤。
        参拜 + 御朱印 + 甘酒摊位（境内 三が日 期间出摊）。寒冷 + 排队久，多层保暖 + 暖贴。
    - id: day-07-hokudai-walk
      place: { ref: hokkaido-university }
      notes_zh: >-
        札幌駅 北口步行 5 – 10 分钟。冬季主看 ポプラ並木 + 主路雪景 + 克拉克像 + 古河记念讲堂。
        校园自由参观，元旦也开放；冷天走 45 – 60 分钟即可，不必逛完。
