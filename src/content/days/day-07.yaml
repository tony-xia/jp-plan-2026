  title_zh: 第 7 天 · 元旦 · 迎初日の出 🌅
  intro_zh: >-
    元旦日本传统两件套：**初日の出（2027 年第一道日光）→ 初詣（新年第一次参拜）**。
    清晨上 JR 札幌駅 顶楼 T38 展望室（元旦特别提早开门）迎接 ~7:00 日出 —— 6:00 前到位比较从容；
    早餐后搭地铁到 円山公園 → 北海道神宮 初詣，9 点前到能避开 10 – 14 点的人潮。
    晚上就近找间拉面 / 居酒屋 —— 薄野附近元旦还开门的店家比景点多得多。
    ⚠️ 元旦当天大多数景点 / 餐厅 / 商店休息（商店一般 1/2 或 1/3 起陆续恢复）。
    头大佛、白い恋人 等都可能休园 —— 已经分别安排到 day-04 / day-08 / day-09，今天不用赶。
    （北海道大学 校园散步已移到 day-04。）
