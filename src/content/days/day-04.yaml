        1972 冬奥跳台场；冬季 11/1 – 4/28 营业 9:00 – 17:00，观景缆车来回 ¥1,000（儿童 ¥500），113 位免费停车场。
        地铁 東西線 円山公園駅 → 中央バス「くらまる号」→ 大倉山ジャンプ競技場。
