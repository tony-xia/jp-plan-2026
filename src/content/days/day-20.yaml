# Day 20 — 2027-01-15 — 札幌 → 东京（转移日）
day:
  id: day-20
  date: "2027-01-15"
  city: tokyo
  title_zh: 第 20 天 · 札幌 → 东京（转移日）
  intro_zh: >-
    ★ 2026-04-20 第三版：Tokyo 压缩到 3 晚 —— 本日几乎整天在路上。
    ~08:00 从酒店出发 → 札幌駅 乘 JR 特急 北斗 → 新函馆北斗（~3.5 小时）→ 北海道新干线 はやぶさ → 东京（~4 小时）。
    合计 ~7.5 – 8 小时 + 换乘；下午 / 晚 抵达东京涩谷基地。
    ⚠️ 暴雪天气时可转飞 新千歳 → 羽田（快速エアポート 札幌 → 新千歳 ~35 分钟 + 1.5 小时飞行）。
    今晚就近涩谷随便吃；明早开始车迷密集日。
  activities:
    - id: day-20-sapporo-depart
      start: "08:00"
      place: { ref: sapporo-station }
      notes_zh: 札幌駅 上 特急 北斗；带大行李必须预约 特大荷物指定席。
    - id: day-20-tokyo-arrive
      place: { ref: shibuya-scramble }
      notes_zh: 抵达东京 → JR 山手线 或 东京メトロ 到涩谷入住。晚上近处自由晚餐。
