# Day 20 — 2027-01-14 — 洞爷湖放松日（Windsor SPA + 湖周补遗）
day:
  id: day-20
  date: "2027-01-14"
  city: hokkaido
  title_zh: 第 20 天 · 洞爷湖放松日（Windsor 夜 3 · 最后一晚）
  intro_zh: >-
    ★ 2026-04-22 第六版新增的 Toya 第 3 晚 —— 放松 / 补遗。
    上午 Windsor SPA + 温泉 + 湖景早午餐；如 day-19 有内容没跑完（Silo / 有珠山 / 登别）今天补；
    湖周小众点（壮瞥 昭和新山、洞爺湖汽船、花火补场）按天气 / 心情挑。
    今天也是天气缓冲：day-21 Toya → Tokyo 直达需要良好的铁路 + 新干线衔接，
    若暴雪 / 列车停运，今日可启动新千歳 → 羽田 飞行备案的订票流程。
