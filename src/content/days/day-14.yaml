# Day 14 — 2027-01-08 — 知床 Utoro 出日（天に続く道 + オシンコシン滝）
day:
  id: day-14
  date: "2027-01-08"
  city: hokkaido
  title_zh: 第 14 天 · 知床 Utoro 方向出日 · 天に続く道 + オシンコシン滝（Abashiri 第 3 晚）
  intro_zh: >-
    ★ 2026-04-22 第六版新增第 3 网走晚 —— 用于专门出去 知床斜里 / Utoro。
    早出自驾 ~1 小时去 斜里，串 天に続く道（冬季起点观景台关闭 + 除雪只保 2 月，看天看路况）
    → オシンコシン滝（部分冻结）→ 回程前可加 流冰物語号 体验（若 2027 年 1 月上旬已开季）。
    ★ 也作天气缓冲日：若 day-12 长途或 day-13 城内计划被风雪打断，今天补课。
  activities:
    - id: day-14-oshinkoshin
      place: { ref: oshinkoshin-falls }
      notes_zh: 部分结冰大瀑布；由网走开车 ~1 小时到斜里方向。
    - id: day-14-road-to-heaven
      place: { ref: road-to-heaven-shari }
      notes_zh: >-
        ⚠️ 冬季起点观景台关闭；道路只有 2 月才保证除雪。
        当日先查 北海道開発局 道路情報，实地再决定是否驾入；否则路边远观。
    - id: day-14-ryuhyo-monogatari-train
      place: { ref: ryuhyo-monogatari-train }
      notes_zh: >-
        可选：如 2027 年 1 月上旬 流氷物語号 已开季（通常 1 月下旬开）可替代自驾 / 串联 知床斜里。
        网走 → 知床斜里 列车 ~1 小时；JR 北海道官网确认 2027 年开季日期。
