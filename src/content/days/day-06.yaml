# Day 06 — 2026-12-31 — 跨年夜 · 札幌
day:
  id: day-06
  date: "2026-12-31"
  city: hokkaido
  title_zh: 第 6 天 · 跨年夜 · 札幌（夜 2）
  intro_zh: >-
    ★ 用户选定：跨年夜在札幌。白日轻量活动，晚上留力在市中心跨年。
    上午 二条市場 海鲜丼当早饭 → 白天 大通公園 + 札幌电视塔 + 狸小路 / 薄野一带散步；
    黄昏 藻岩山 缆车日落 + 蓝调夜景（北海道三大夜景之一）→ 薄野跨年晚餐（海鲜 / 蟹 or 札幌拉面）→
    札幌白色灯节（駅前通・南一条通会场仍亮灯）→ 大通公園 + 札幌电视塔 跨年倒数迎接元旦。
    ⚠️ 大晦日很多餐厅提早打烊或停业，预订前务必逐家确认营业时间。
  activities:
    - id: day-06-nijo-market
      place: { ref: nijo-market-sapporo }
      notes_zh: >-
        市场一般到中午前；早餐海鲜丼。
        ⚠️ 大晦日部分摊位提前关门，8 – 10 点时段最稳。
    - id: day-06-odori
      place: { ref: odori-park-tv-tower }
      notes_zh: >-
        白日散步大通公園 + 札幌电视塔（展望台可登）。大晦日 / 元旦附近可能有跨年倒计时活动 —— 出行前查 sapporo-tv-tower.co.jp 公告。
    - id: day-06-moiwa
      place: { ref: mt-moiwa-ropeway }
      notes_zh: >-
        北海道三大夜景之一（我们 3 座已集齐：函馆山 day-02、藻岩山 today、天狗山 day-15 小樽）。
        冬季 12 – 3 月 11:00 – 22:00，末班上行 21:30。
        ⚠️ 年末年始（12/31 – 1/1）营业时间可能临时变动，出行前确认；
        大晦日日落约 16:10 —— 日落前 40 – 60 分钟上山，接连看日落 + 蓝调 + 全黑 3 段。
    - id: day-06-nye-dinner
      place: { ref: seafood-buffet-nanda }
      notes_zh: >-
        薄野跨年晚餐首选。⚠️ 必提前 2 – 3 周预约；确认大晦日是否营业。
        如 NANDA 大晦日停业，备选 A：薄野拉面街找一家正在营业的札幌味噌拉面暖身（跨年夜比海鲜店更容易开门）；
        备选 B：日本大晦日传统吃 年越しそば（跨年荞麦面），薄野附近 蕎麦屋 多有营业。
    - id: day-06-white-illumination
      place: { ref: sapporo-white-illumination }
      notes_zh: >-
        晚餐后走 駅前通会場 / 南一条通会場 灯节（跨年夜仍亮灯），一路朝大通公園倒数会场走。
        ⚠️ 大通公園 1 – 5 丁目会場 一般 12/25 前后已结束 —— 跨年夜主要看街道会场。
        顺路可扫一眼 大通 2 丁目 慕尼黑圣诞市场位置（几乎肯定已闭市，见 munich-christmas-market-sapporo 说明）。
    - id: day-06-countdown
      place: { ref: odori-park-tv-tower }
      notes_zh: >-
        大通公園 + 札幌电视塔 跨年倒数。电视塔通常有跨年特别延长营业（登塔倒数）—— 若走这套需提前官网购票。
        户外倒数免票；塔下广场 23:30 起聚集，0:00 迎接 2027 年。⚠️ 零下气温 + 长时间站立，务必多层保暖 + 暖贴 + 热饮。
