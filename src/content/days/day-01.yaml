# Day 01 — 2026-12-26 — 羽田抵日 → 新干线到函馆（享受函馆山夜景）
day:
  id: day-01
  date: "2026-12-26"
  city: hokkaido
  title_zh: 第 1 天 · 抵达羽田 → 新干线 → 函馆（享受函馆山夜景）
  intro_zh: >-
    早上 4 人在 羽田 会合，搭 单轨 / 京急 + JR 山手 到 东京站，再换 東北・北海道新幹線「はやぶさ」一路北上
    新函館北斗 → JR 函館ライナー → 函馆駅，门到门差不多 7 – 8 小时，预计下午 14:00 – 15:00 左右抵达。
    要是体力和天气都配合，傍晚就上 函馆山 看夜景 —— 12 月日落 ~16:05，15:20 – 15:30 上缆车，
    日落 → 蓝调 → 全黑 一气呵成。民宿先寄行李，或直接从函馆駅 步行 6 分钟搭市电到 十字街 转缆车山麓駅。
    下山后市区找点简餐。要是到得晚 / 天气不好 / 缆车停运，今晚就直接休息，明天傍晚再上函馆山 ——
    给函馆山两次机会，不急。
    ⚠️ 4 人 + 冬装 + 大件行李：はやぶさ「特大荷物スペースつき座席」（大行李指定席）记得跟车票一起预约 ——
    元旦前后比较热门，确定航班后尽早订。
