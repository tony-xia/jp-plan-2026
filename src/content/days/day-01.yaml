# Day 01 — 2026-12-26 — 羽田抵日 → 新干线直达函馆（长途移动日 + 函馆山夜景首攻）
day:
  id: day-01
  date: "2026-12-26"
  city: hokkaido
  title_zh: 第 1 天 · 抵达羽田 → 新干线 → 函馆（夜攻函馆山）
  intro_zh: >-
    早上 4 人在 羽田 会合 → 单轨 / 京急 + JR 山手 → 东京站（~30 – 40 分）→ 東北・北海道新幹線「はやぶさ」→
    新函館北斗 → JR 函館ライナー → 函馆駅（门到门 ~7 – 8 小时，含换乘缓冲）。
    预计 14:00 – 15:00 左右抵达函馆。若 体力 + 天气 允许 → 当晚首攻 函馆山夜景（12 月日落 ~16:05，
    15:20 – 15:30 上缆车，接连看 日落 + 蓝调 + 全黑 3 段）；民宿先寄放行李，或直接从函馆駅步行 6 分钟到
    市电 → 十字街 → 缆车山麓駅。下山后市区简餐。
    ⚠️ 若 到得晚 / 天气不好 / 缆车停运 → 跳过今晚，回退到 Day 2 傍晚做备选攻；函馆山给两次机会 + 一次天气缓冲。
    ⚠️ 4 人 + 冬装 + 大件行李：務必预约 はやぶさ「特大荷物スペースつき座席」—— 元旦前后热门，早订。
  activities:
    - id: day-01-mt-hakodate-primary
      place: { ref: mt-hakodate-observatory }
      notes_zh: >-
        ★ 函馆山夜景「首攻」—— 北海道三大夜景之一，committed 必去。
        冬季登山自动车道封山，只能坐 函館山ロープウェイ（125 人大轿厢，~3 分钟）。
        12 月日落 ~16:05 → 目标 15:20 – 15:30 上缆车，拿下 日落 + 蓝调 + 全黑 3 段。
        山顶风大体感极冷：多层保暖 + 帽 + 手套 + 暖贴 必备。下山排队长，全程预算 2 – 2.5 小时。
        🛡️ 「首攻不行就补攻」：今晚若因抵达晚 / 天气差 / 缆车停运没能上，回退到 Day 2 傍晚（Day 2 的同一活动
        被标为 priority: nice，前提就是今晚没完成）。