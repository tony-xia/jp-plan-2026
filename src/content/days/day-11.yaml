# Day 11 — 2027-01-05 — 稚内全天（宗谷岬 + 天气缓冲）
day:
  id: day-11
  date: "2027-01-05"
  city: hokkaido
  title_zh: 第 11 天 · 宗谷岬 + 稚内全天（稚内夜 2 · 天气缓冲）
  intro_zh: >-
    ★ 专门的 宗谷岬 日 + 恶劣天气 / 白化的备用日。
    早上 Surfeel 出发 → 宗谷岬（日本最北端）→ 回稚内市内午餐 → 下午 ノシャップ岬（若 day-10 已去则替换为 稚内公園 / 氷雪の門 / 寒流水族館）。
    今晚再宿 Surfeel。明早（day-12）启程沿鄂霍次克海岸长途开到网走。
    ⚠️ 稚内冬季白化天气常见；如早上宗谷岬风暴 / 视野差 → 下午再试；依然不行就全天泡温泉 / 水族馆 / 酒店休整。
  activities:
    - id: day-11-cape-soya
      start: "08:30"
      place: { ref: cape-soya }
      notes_zh: >-
        日本最北端纪念碑。稚内市中心 → 宗谷岬 ~30 km / 40 分钟；R238 全年通车。
        ⚠️ 冬季风暴大 + 白化；出发前查 JARTIC / 北海道開発局 道路情報。
        标志：「日本最北端之地」三角碑、「宗谷岬之歌」石碑；晴天可望 43 km 外的萨哈林岛。
    - id: day-11-noshappu-or-park
      place: { ref: noshappu-cape }
      notes_zh: >-
        如 day-10 已去过 ノシャップ岬，改去 稚内公園 + 氷雪の門（稚内山丘上的展望 + 战争记念）、
        或寒流水族館（市内，室内备用）。冬季白化日 → 寒流水族館 + 温泉。
