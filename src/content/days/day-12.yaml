# Day 12 — 2027-01-06 — 稚内 → 鄂霍次克海岸 → 网走
day:
  id: day-12
  date: "2027-01-06"
  city: hokkaido
  title_zh: 第 12 天 · 沿鄂霍次克海岸 慢慢开到网走（顺时针路线的灵魂）
  intro_zh: >-
    ★ 顺时针环线的灵魂之一：早上从稚内出发走 R238 沿鄂霍次克海岸一路东南开到网走 ——
    左侧驾驶 + 向东行驶 = 海一直在驾驶员一侧，是顺时针走这圈才有的画面。
    一整天慢慢开，沿途 音威子府 / 枝幸 / 雄武 / 紋別 / サロマ湖 想停就停。
    傍晚抵达网走，市内入住。
    天气不好就改走 R40 → 旭川 → R39 内陆路线 —— 放弃海景，但路况和视野更稳。
    （宗谷岬 day-11 已经去过，今天不再往返。）
