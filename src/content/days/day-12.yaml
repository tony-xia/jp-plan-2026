# Day 12 — 2027-01-06 — 稚内 → 鄂霍次克海岸 → 网走
day:
  id: day-12
  date: "2027-01-06"
  city: hokkaido
  title_zh: 第 12 天 · 沿鄂霍次克海岸 慢慢开到网走（顺时针路线的灵魂）
  intro_zh: >-
    ★ 顺时针环线的灵魂之一：早上从稚内出发走 R238 沿鄂霍次克海岸一路东南开到网走 ——
    左侧驾驶 + 向东行驶 = 海一直在驾驶员一侧，是顺时针走这圈才有的画面。
    一整天慢慢开，沿途 音威子府 / 枝幸 / 雄武 / 紋別 / サロマ湖 想停就停。
    傍晚抵达网走，市内入住。
    天气不好就改走 R40 → 旭川 → R39 内陆路线 —— 放弃海景，但路况和视野更稳。
    出城顺路再经过一次 宗谷岬 —— 日本最北端，再合个影也不亏；想停就停一下、不停也无所谓。
    抵达网走还有日光余裕的话，再顺一段 ~20 分钟到 能取岬 看一眼日落；天黑了就直接回酒店。
  activities:
    - id: day-12-cape-soya-drivethru
      place: { ref: cape-soya }
      priority: nice
      notes_zh: 日本最北端，顺路再路过一次（day-11 已经认真去过）—— 想下车再合张影 / 吹吹海风就停一下，不停也无所谓。
    - id: day-12-cape-notoro-early
      place: { ref: cape-notoro }
      priority: nice
      notes_zh: 抵达网走还有日光的话，再开 ~20 分钟去吹吹风看灯塔 / 夕阳；天黑了就直接回酒店、明天再说。
