# Day 12 — 2027-01-07 — 美瑛丘陵 → 小樽（鱼真 · 运河 · 天狗山夜）
day:
  id: day-12
  date: "2027-01-07"
  city: hokkaido
  title_zh: 第 12 天 · 美瑛丘陵 → 小樽（鱼真午餐 · 运河 · 天狗山夜）
  intro_zh: >-
    ★ 小樽 3 晚的第 1 晚（中心街）。上午美瑛丘陵两棵树（クリスマスツリー + セブンスター）；
    然后开到小樽（~200 km / 冬季 3 – 4 小时 · 旭川 → 道央道）。
    ⚠️ 2027-01-07 是周四 —— 鱼真 开门（周日休），不接受预订；开门前 20 – 30 分钟排队。
    赶得上就午餐鱼真，赶不上改小樽市区其它寿司。下午 运河 + 音乐盒堂 + 堺町通り；日落后 天狗山 夜景。
