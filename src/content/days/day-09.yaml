  city: hokkaido
  title_zh: 第 9 天 · 漫步札幌市区（City Walk）
  intro_zh: >-
    自驾环线之前最后一个完整的 Sapporo 整日。今天**不开车**，市区慢慢走 ——
    大通公园 / 狸小路 / 薄野 / 札幌駅 周边、札幌市時計台、北海道庁旧本庁舎（赤れんが）。
    想加点东西的话，可以挑 day-05 没去到的 Asahiyama 记念公园（开车，看心情）或 NYE 没逛完的小巷食肆。
    1/3（周日）大部分商家都恢复营业了；保留弹性应对天气和体力，明天（day-10）再开始北上。
