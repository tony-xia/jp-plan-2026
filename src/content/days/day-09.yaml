  title_zh: 第 9 天 · 稚内 → 鄂霍次克海岸 → 网走（超长途日 · 顺时针路线精髓）
  intro_zh: >-
    🚨 顺时针环线最硬一天：早离稚内走 R238 沿鄂霍次克海岸东南到网走（~320 km / 冬季 5 – 6 小时）。
    ★ 左侧驾驶 + 向东行驶 = 海在驾驶员一侧，是顺时针路线的核心体验。
    中途 音威子府 / 枝幸 / 雄武 / 紋別 / サロマ湖 可以短停；遇暴风 / 白化走 R40 → 旭川 → R39 内陆备案（放弃海景）。
    傍晚抵达网走，市内入住。⚠️ 宗谷岬已在 day-08 完成，不再往返。
