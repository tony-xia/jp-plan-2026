# Day 18 — 2027-01-13 — 登别地狱谷 + Windsor 收尾夜
day:
  id: day-18
  date: "2027-01-13"
  city: hokkaido
  title_zh: 第 18 天 · 登别地狱谷 + Windsor 收尾夜（Hokkaido 最后一夜）
  intro_zh: >-
    ★ 2026-04-20 新增一日（Toya +1）：有充裕时间跑 登别地狱谷 + 温泉街。
    上午酒店出发（打车 / 酒店安排用车） → 登别地狱谷（~40 – 50 分钟）→ 登别温泉街午餐 → 可加 クマ牧場 /
    大湯沼川天然足湯（冬季仍开放的战术性热点）→ 下午回 Windsor 享受 SPA / 晚餐 / 湖景。
    今晚是 Hokkaido 的最后一夜 —— Windsor 的晚餐值得留出完整时段。明早（day-19）收拾行李 + 酒店班车去 洞爺駅，
    乘 北斗 + 新幹線 到东京。
  activities:
    - id: day-18-noboribetsu
      start: "09:30"
      place: { ref: noboribetsu-jigokudani }
      notes_zh: >-
        活火山造就的硫磺地狱谷 + 温泉街。酒店 → 地狱谷 ~40 – 50 分钟（可让酒店代叫出租）。
        现场建议 2 – 3 小时（散步 + 温泉街午餐）。
    - id: day-18-windsor-evening
      place: { ref: windsor-hotel-toya }
      notes_zh: >-
        下午回酒店享受 SPA + 室内温泉。晚上 Windsor 主餐厅预订一顿正式的 Hokkaido 收尾晚餐。
        ⚠️ Windsor 多家餐厅需入住当天预约；办理入住时同时订好 day-17 和 day-18 两晚晚餐。
