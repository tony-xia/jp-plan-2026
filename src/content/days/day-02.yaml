# Day 02 — 2026-12-27 — 函馆自由日
day:
  id: day-02
  date: "2026-12-27"
  city: hokkaido
  title_zh: 第 2 天 · 函馆自由日（朝市 · 元町 · 金森仓库）
  intro_zh: >-
    抵达后第一个完整日，先缓冲：早上函馆朝市海鲜丼，午后元町坂 + 八幡坂 + 赤レンガ倉庫
    （金森 Bay Hakodate 商圈）。视天气加湯の川温泉 泡汤或市电沿线随便逛。
    今晚保留市区简餐，留着精力等明晚的 函馆山 夜景。
  activities:
    - id: day-02-mt-hakodate
      place: { ref: mt-hakodate-observatory }
      notes_zh: >-
        ★ 要求清单 committed「必去」：函馆山夜景（北海道三大夜景之一）。
        冬季登山自动车道对车辆 / 巴士 / 出租全封闭 —— 仅剩 函館山ロープウェイ（125 人大车，~3 分钟）。
        日落前 30 – 45 分钟上山，接连看 日落 + 蓝调 + 全黑 3 段；1 月日落 ~16:20。
        ⚠️ 山顶风大 + 体感低温极端 —— 多层保暖 + 帽 + 手套 + 暖贴。下山排队亦长，预算全程 2 – 2.5 小时。
