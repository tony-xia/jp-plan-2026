# Day 02 — 2026-12-27 — 函馆全日：朝市 · 元町 · 金森 · 五稜郭塔（+ 函馆山备选）
day:
  id: day-02
  date: "2026-12-27"
  city: hokkaido
  title_zh: 第 2 天 · 悠闲漫游函馆（朝市 · 元町 · 金森 · 五稜郭塔）
  intro_zh: >-
    函馆慢慢逛一整天。主题三件套：海鲜早市 + 元町坡道街区漫步 + 白天高处展望。
    早上 函馆朝市 吃海鲜丼暖身，中午沿 八幡坂 走上元町教堂群、再下到 金森赤砖仓库 吃午饭逛店，
    下午到 五稜郭塔 俯瞰雪中五角星要塞（白天光线最好）。傍晚怎么走，看 Day 1 的情况：
    Day 1 晚上已经上过 函馆山 → 今晚市区简餐 + 泡汤放松；
    Day 1 没上成 → 傍晚再去十字街方向上一次缆车看夜景。
    时间还有富余可以加 湯の川温泉 泡个汤。
