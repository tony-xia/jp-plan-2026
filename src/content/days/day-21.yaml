# Day 21 — 2027-01-15 — 洞爷 → 东京（转移日，直达不绕札幌）
day:
  id: day-21
  date: "2027-01-15"
  city: tokyo
  title_zh: 第 21 天 · 洞爷 → 东京（转移日）
  intro_zh: >-
    ★ 2026-04-22 第六版：Toya → Tokyo 直达，不绕回札幌（上一版本的 Sapporo 返程 3 晚被取消）。
    ~09:00 Windsor 早班车到 洞爺駅 → 乘 JR 特急 北斗 南下 → 新函館北斗（~2 小时）→
    北海道新干线 はやぶさ → 东京（~4 小时）。合计 ~6 – 6.5 小时 + 换乘；下午 / 傍晚抵东京入住。
    ⚠️ 暴雪天气时可转飞：特急 北斗 → 札幌 → 快速エアポート → 新千歳 → 羽田（~1.5 小时飞行）。
    今晚就近晚餐；明早开始车迷密集日。
  activities:
    - id: day-21-tokyo-arrive
      place: { ref: shibuya-scramble }
      notes_zh: 抵达东京 → JR 山手线 或 东京メトロ 到涩谷 / 浅草一带入住。晚上近处自由晚餐。
  bookings:
    - id: day-21-toya-tokyo-rail
      kind: shinkansen
      title_zh: "特急 北斗 + 北海道新干线：洞爺 → 新函館北斗 → 东京"
      start: "2027-01-15"
      from: { zh: 洞爺站, en: Toya Station, ja: 洞爺駅 }
      to: { zh: 东京站, en: Tokyo Station, ja: 東京駅 }
      details_zh: >-
        ① 特急 北斗 洞爺 → 新函館北斗（南下，~2 小时）；
        ② 北海道新干线 はやぶさ 新函館北斗 → 东京（~4 小时）。
        两段均预约大行李指定席（はやぶさ 必须）。坏天气备选：飞 新千歳 → 羽田。
