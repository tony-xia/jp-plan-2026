# Day 21 — 2027-01-15 — 洞爷 → 东京（转移日，直达不绕札幌）
day:
  id: day-21
  date: "2027-01-15"
  city: tokyo
  title_zh: 第 21 天 · 洞爷 → 东京
  intro_zh: >-
    ★ 2026-04-22 第六版：Toya → Tokyo 直达，不绕回札幌。
    ~09:00 搭 Windsor 早班车到 洞爺駅 → JR 特急 北斗 南下 → 新函館北斗 →
    北海道新干线 はやぶさ → 东京。一路约 6 – 6.5 小时（含换乘），下午 / 傍晚抵东京入住，
    可以慢慢看车窗外北海道转回本州的雪景。
    今晚就近吃晚餐，养精蓄锐；明天进入车迷主题日。
    ⚠️ 暴雪天气可改走飞：特急 北斗 → 札幌 → 快速エアポート → 新千歳 → 羽田（~1.5 小时）。
  activities:
    - id: day-21-tokyo-arrive
      place: { ref: shibuya-scramble }
  bookings:
    - id: day-21-toya-tokyo-rail
      kind: shinkansen
      title_zh: "特急 北斗 + 北海道新干线：洞爺 → 新函館北斗 → 东京"
      start: "2027-01-15"
      from: { zh: 洞爺站, en: Toya Station, ja: 洞爺駅 }
      to: { zh: 东京站, en: Tokyo Station, ja: 東京駅 }
      details_zh: >-
        ① 特急 北斗 洞爺 → 新函館北斗（南下，~2 小时）；
        ② 北海道新干线 はやぶさ 新函館北斗 → 东京（~4 小时）。
        两段都记得预约大行李指定席（はやぶさ 强制）。坏天气备选：飞 新千歳 → 羽田。
