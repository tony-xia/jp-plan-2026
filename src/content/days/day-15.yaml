# Day 15 — 2027-01-09 — 网走 → 美瑛丘陵 → 小樽（鱼真 · 运河 · 天狗山夜）
day:
  id: day-15
  date: "2027-01-09"
  city: hokkaido
  title_zh: 第 15 天 · 网走 → 美瑛丘陵 → 小樽（小樽夜 1）
  intro_zh: >-
    ★ 小樽 3 晚的第 1 晚（中心街）。早离网走一路西行（网走 → 美瑛 ~4 – 5 小时冬季），
    中途 美瑛 两棵树（クリスマスツリー + セブンスター）短停；
    然后开去小樽（美瑛 → 小樽 ~3 – 4 小时 · 旭川 → 道央道）。全天自驾 ~7 – 9 小时。
    ⚠️ 2027-01-09 是周六 —— 鱼真 开门（周日休），不接受预订；
    如若当天赶得上就午餐鱼真（通常 12:00 – 14:00 或 16:00 后），否则晚饭或改小樽市区其它寿司。
    下午 运河 + 音乐盒堂 + 堺町通り；日落后 天狗山 夜景。
  activities:
    - id: day-15-christmas-tree
      place: { ref: biei-christmas-tree }
      notes_zh: ⚠️ 无停车场 + 私人农地，路边取景即走，绝不踏入田地。
    - id: day-15-seven-stars-tree
      place: { ref: biei-seven-stars-tree }
      notes_zh: 有停车场，比 クリスマスツリー 好停。
    - id: day-15-drive-to-otaru
      place: { ref: otaru-canal }
      notes_zh: 美瑛 → 小樽 旭川 → 道央道 → 札樽道；冬季估 3 – 4 小时。
    - id: day-15-uomasa
      place: { ref: uomasa-otaru }
      notes_zh: >-
        不接受预订，周日休；2027-01-09 周六营业。到达时间不稳定 —— 按长途驾驶计算多半赶晚饭。
        午间 12:00 – 14:00 或晚间 16:00 – 21:30 之一。
    - id: day-15-music-box
      place: { ref: otaru-music-box-museum }
