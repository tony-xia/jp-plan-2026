    notes_zh: >-
      2008 年 G8 洞爺湖峰会的主会场。山顶豪华度假酒店，绝景。住 2 晚 = 2 间房。
      ★ 从 JR 洞爺駅 可乘 酒店免费接驳巴士（需提前一天 18:00 前预约）。
      目前班次：11:00 / 13:00 / 14:20 / 16:55 / 19:00，单程约 40 分钟。
      出发前一周再次确认最新时刻表。

  - id: toyako-silo-observation-deck
    name:
      zh: 洞爷国立公园 筒仓展望台
      en: Toya National Park Silo Observation Deck
      ja: サイロ展望台
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/vbz1fb4sMXW5NMvJ8
    address:
      full:
        zh: 北海道虻田郡洞爷湖町成香 3-5
        ja: 〒049-5722 北海道虻田郡洞爺湖町成香3-5
    notes_zh: >-
      洞爷湖畔高地的免费展望台。冬季（11 月 – 4 月）营业 8:30 – 17:00，入场免费，全年无休。
      1 – 3 月院内有雪地娱乐区（雪地摩托、雪上筏），可顺便玩。

  - id: usuzan-ropeway
    name:
      zh: 有珠山缆车 · 洞爷湖展望台
      en: Usuzan Ropeway + Toyako Observation Deck
      ja: 有珠山ロープウェイ・洞爺湖展望台
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/XEf1pdWgJFufiVg66
    address:
      full:
        zh: 北海道有珠郡壮瞥町字昭和新山 184-5
        ja: 〒052-0102 北海道有珠郡壮瞥町字昭和新山184-5
    notes_zh: >-
      从昭和新山山麓站缆车上山顶站。冬季营业 9:00 – 16:00（季节变动）。
      山顶站旁有「洞爷湖展望台」，再步行约 7 分钟可到「火口原展望台」。
      ⚠️ 冬季（11 月 – 4 月）外輪山遊歩道封闭，无法走到銀沼大火口 / 外輪山展望台。

