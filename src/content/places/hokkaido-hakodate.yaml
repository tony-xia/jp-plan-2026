# Hokkaido · Hakodate — sights, restaurants, Airbnbs.
places:
  - id: mt-hakodate-observatory
    name:
      zh: 函馆山展望台
      en: Mt. Hakodate Observatory
      ja: 函館山展望台
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/J8tzCmFUpPLwpddQ7
    address:
      full:
        zh: 北海道函馆市函馆山
        ja: 〒040-0000 北海道函館市函館山
    notes_zh: >-
      「百万夫人夜景」所在地。冬季函馆山登山道路封闭，禁止汽车、巴士、出租上山，
      只能乘函馆山缆车（125 人大轿厢，3 分钟，冬季 2026-11 – 2027-04 运营）。
      山顶风大气温低，务必带厚外套、围巾、手套、帽子。日落后看夜景最佳。

  - id: hakodate-morning-market
    name:
      zh: 函馆朝市
      en: Hakodate Morning Market
      ja: 函館朝市
    kind: sight
    address:
      full:
        zh: 北海道函馆市若松町 9-19
        ja: 〒040-0063 北海道函館市若松町9-19
    notes_zh: >-
      紧邻 JR 函馆駅西口，步行 1 – 2 分钟。约 250 家店铺，海鲜丼（海胆 / 鲑鱼籽 / 蟹）是招牌。
      冬季营业 ~6:00 – 14:00（各店略异），想吃「どんぶり横丁市場」的人气店建议 7 – 9 点去。
      现钓墨鱼、活鱼活蟹、北海道特产干货伴手礼。年末年始部分店铺休业，行前再确认。

  - id: hachimanzaka
    name:
      zh: 八幡坂
      en: Hachimanzaka Slope
      ja: 八幡坂
    kind: sight
    address:
      full:
        zh: 北海道函馆市元町
        ja: 〒040-0054 北海道函館市元町14
    notes_zh: >-
      函馆元町最上镜的一条坡道，镜头顺坡而下正对港口与停泊的摩周丸纪念舰，
      是函馆明信片经典机位。冬季整条路两侧积雪 + 路灯 + 石板路，傍晚尤其美。
      从市电「末広町」站步行 2 – 3 分钟上山即达。旁边是旧函馆区公会堂、
      Russian Orthodox、Catholic、Episcopal 三座百年教堂，可一并漫步。

  - id: kanemori-red-brick-warehouses
    name:
      zh: 金森赤砖仓库
      en: Kanemori Red Brick Warehouses
      ja: 金森赤レンガ倉庫
    kind: sight
    address:
      full:
        zh: 北海道函馆市末広町 14-12
        ja: 〒040-0065 北海道函館市末広町14-12
    notes_zh: >-
      明治 40 年代的港湾赤砖仓库群，现改造为 Bay Hakodate 商业设施：
      工艺品、玻璃制品、北海道食品伴手礼、海鲜 / 西餐餐厅、咖啡馆。
      冬季（12 月初 – 2 月）夜间点灯 + 圣诞树装饰延续到 1 月上旬。
      紧邻市电「十字街」站，与八幡坂 / 元町教堂群步行同一圈行程。

  - id: goryokaku-tower
    name:
      zh: 五稜郭塔
      en: Goryokaku Tower
      ja: 五稜郭タワー
    kind: sight
    address:
      full:
        zh: 北海道函馆市五稜郭町 43-9
        ja: 〒040-0001 北海道函館市五稜郭町43-9
    notes_zh: >-
      107 米观景塔，俯瞰脚下 五稜郭（江户末期星形要塞公园）—— 冬天被雪覆盖的五角星轮廓
      从空中看尤其震撼，是函馆白天最佳展望点。塔内一层有土方岁三 / 箱馆戦争历史展示。
      冬季营业 9:00 – 18:00（各季略异），成人约 ¥1,000。从市电「五稜郭公園前」站步行 ~15 分钟，
      或从 函館駅 乘 函館バス 约 20 分钟。预留 60 – 90 分钟（含塔下 五稜郭公園 雪中漫步）。
