        ja: 〒100-0005 東京都千代田区丸の内1-9-1
    notes_zh: >-
      Day 01 从羽田过来换乘北陆新干线「あさま / はくたか」前往 軽井沢駅 的换乘点。
      羽田 → 东京站：东京单轨 + JR 山手线 或 京急 + JR，约 30 分钟。
      Day 04 从 軽井沢 开过来后再换乘 東北・北海道新幹線「はやぶさ」前往 新函館北斗 的换乘点，
      东京站內 北陆 ↔ 东北/北海道 换乘约 15 分钟；预留 30 分钟以上缓冲，尤其因带大行李。
