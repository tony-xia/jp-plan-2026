      ja: 東京スバル 三鷹店
    kind: shop
    googleMapsUrl: https://maps.app.goo.gl/uC6JZiCyG4enm6m27
    address:
      full:
        zh: 东京都三鹰市大泽 3-9-6
        ja: 〒181-0015 東京都三鷹市大沢3-9-6
