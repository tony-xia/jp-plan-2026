  - id: oedo-antique-market
    name:
      zh: 大江户骨董市
      en: Oedo Antique Market (Tokyo Int'l Forum)
      ja: 大江戸骨董市（東京国際フォーラム）
    kind: shop
    address:
      full:
        zh: 东京都千代田区丸之内 3-5-1 东京国际论坛 户外广场
        ja: 〒100-0005 東京都千代田区丸の内3-5-1 東京国際フォーラム地上広場
    notes_zh: >-
      日本最大户外骨董市；约 250 家古董商。每月第 1、3 周日 09:00 – 16:00，入场免费。
      ★ 2027-01 预估开市日：1/3（第 1 周日）和 1/17（第 3 周日）—— 1/17 恰好在我们东京档期内，
      是本次旅行接触「公开骨董」的最佳固定场合。品类：和服 / 浮世绘 / 伊万里 / 九谷 / 有田陶瓷 /
      明治大正玻璃 / 佛具 / 根付 / 日本刀 / 古钱币。⚠️ 户外活动，下雨 / 大雪可能取消 —— 前一天查官网。

