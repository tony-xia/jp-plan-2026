  - id: subaru-star-square-ebisu
    name:
      zh: SUBARU 星广场（惠比寿旗舰展厅）
      en: Subaru Star Square (Ebisu Flagship Showroom)
      ja: スバルスタースクエア
    kind: shop
    address:
      full:
        zh: 东京都涩谷区惠比寿 1-20-8 惠比寿 Garden Place Tower B1F
        ja: 〒150-6090 東京都渋谷区恵比寿1-20-8 恵比寿ガーデンプレイスタワー B1F
    notes_zh: >-
      Subaru 品牌旗舰展厅（非经销店），位于 惠比寿 Garden Place Tower 地下一层。
      展示概念车 / 最新车型 / 汽车文化活动，开放式自由参观。
      从涩谷基地：JR 山手线 涩谷 → 惠比寿 1 站（~3 分钟）+ 步行 5 – 7 分钟。
      ⚠️ 营业时间 / 开放日 请在出行前向店方或官网再确认（部分活动 / 企划日需提前预约）。

