# Hokkaido · Sapporo — sights, restaurants, hotels (front-end 3-night + car-drop night).
places:
  - id: shiroi-koibito-park
    name:
      zh: 白色恋人公园
      en: Shiroi Koibito Park
      ja: 白い恋人パーク
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/b1ApSWrbx2XNN8M96
    address:
      full:
        zh: 北海道札幌市西区宫之泽 2-2-11-36
        ja: 〒063-0052 北海道札幌市西区宮の沢2丁目2-11-36
    notes_zh: >-
      石屋製菓 的巧克力主题公园。公园 10:00 – 18:00，付费区最后入园 16:30。
      ★「スイートイルミネーション Blooming Snow Fantasy」2026-11-15 – 2027-03-31 每晚 16:00 – 19:00，观赏免费。
      建议下午去玩工厂 + 黄昏直接看亮灯。最近地铁：東西線 宮の沢駅，步行 7 分钟。

  - id: hokkaido-university
    name:
      zh: 北海道大学 (札幌校区)
      en: Hokkaido University (Sapporo Campus)
      ja: 北海道大学 札幌キャンパス
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/Zm63kDKX2KVeC9Ez6
    address:
      full:
        zh: 北海道札幌市北区北 8 条西 5 丁目
        ja: 〒060-0808 北海道札幌市北区北8条西5丁目
    notes_zh: >-
      札幌駅 北口步行可达。冬季主看白杨並木（ポプラ並木）、主路积雪、克拉克博士像、
      古河记念讲堂。银杏並木冬季已落叶，非我们的季节。校园自由参观、免费。

  - id: kani-honke-sapporo
    name:
      zh: 蟹本家 札幌驿前本店
      en: Kani Honke Sapporo Station Main Branch
      ja: かに本家 札幌駅前本店
    kind: restaurant
    googleMapsUrl: https://maps.app.goo.gl/AjyvERYf8gcbVFik6
    address:
      full:
        zh: 北海道札幌市中央区北 3 条西 2-1-18
        ja: 〒060-0003 北海道札幌市中央区北3条西2-1-18
    notes_zh: >-
      老牌螃蟹料理专门店，札幌駅 附近。强烈建议 4 人晚餐提前预订
      （冬季至少提前 2 – 3 周）。课程菜有多套可选：タラバ / ズワイ / ケガニ。
    dishes:
      - { zh: 帝王蟹刺身, ja: タラバガニ刺身 }
      - { zh: 松叶蟹涮锅, ja: ズワイガニしゃぶ }
      - { zh: 毛蟹料理, ja: 毛ガニ料理 }

  - id: seafood-buffet-nanda
    name:
      zh: 海鲜自助 NANDA
      en: Seafood Buffet NANDA
      ja: 海鮮ビュッフェ NANDA
    kind: restaurant
    googleMapsUrl: https://maps.app.goo.gl/mh3XyFZpWTyg1W9z5
    address:
      full:
        zh: 北海道札幌市中央区南 4 条西 4-1 丁目
        ja: 〒064-0804 北海道札幌市中央区南4条西4丁目1
    notes_zh: 札幌薄野（ススキノ）附近的海鲜自助餐。人气高，建议 4 人提前 2 – 3 周预订。

  - id: hill-of-the-buddha
    name:
      zh: 头大佛 (真驹内泷野灵园)
      en: Hill of the Buddha (Makomanai Takino Cemetery)
      ja: 頭大仏殿（真駒内滝野霊園）
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/FaoXKA6y4uEwWEU8A
    address:
      full:
        zh: 北海道札幌市南区真驹内泷野 2
        ja: 〒005-0862 北海道札幌市南区滝野2
    notes_zh: >-
      安藤忠雄设计的「薰衣草山头大佛」。
      冬季（11 – 3 月）拜观时间 10:00 – 15:00（比夏季短）。
      ⚠️ 著名的「水庭」11/4 – 4 月下旬放空不注水，没有镜面反射。
      冬季变成白雪薰衣草田，佛首突出雪面，另有意境。
      札幌駅开车约 40 分钟；或 地下鉄真駒内駅 换 中央バス 真 108（约 20 分钟，¥500）。
      3,300 车位停车场免费。现场停留建议 60 – 90 分钟。

  - id: mt-moiwa-ropeway
    name:
      zh: 藻岩山 缆车
      en: Mt. Moiwa Ropeway
      ja: 札幌もいわ山ロープウェイ
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/Gtsbqa2DhGt3RzNF6
    address:
      full:
        zh: 北海道札幌市中央区伏见 5-3-7
        ja: 〒064-0942 北海道札幌市中央区伏見5-3-7
    notes_zh: >-
      531 m，日本「新三大夜景」+ 北海道「三大夜景」之一。
      冬季 12 – 3 月营业 11:00 – 22:00，末班上行 21:30。年末年始休 —— 2026-12-31 / 2027-01-01 日期需另行确认。
      Nice-to-have：我们已登函馆山和天狗山，藻岩山属同类重复，按时间 / 天气决定。

  - id: asahiyama-memorial-park
    name:
      zh: 旭山记念公园
      en: Asahiyama Memorial Park
      ja: 旭山記念公園
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/oCMB4WRPtNXdXhUa6
    address:
      full:
        zh: 北海道札幌市中央区界川 4 丁目
        ja: 〒064-0945 北海道札幌市中央区界川4丁目
    notes_zh: 免费的山坡市民公园，札幌全景白日观景；藻岩山天气不佳时的备用。

  - id: okurayama-observatory
    name:
      zh: 大仓山展望台 (札幌冬奥跳台)
      en: Mt. Okura Ski Jump Stadium Observatory
      ja: 大倉山ジャンプ競技場展望台
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/bgX3JkzsXUjqXAzS9
    address:
      full:
        zh: 北海道札幌市中央区宫之森 1274
        ja: 〒064-0958 北海道札幌市中央区宮の森1274
    notes_zh: >-
      1972 年札幌冬奥跳台场地；双人吊椅上展望台。
      冬季营业 11/1 – 4/28 每日 9:00 – 17:00；缆椅往返 成人 ¥1,000 / 小孩 ¥500。免费停车 113 位。

  - id: royce-cacao-chocolate-town
    name:
      zh: ROYCE' 可可与巧克力小镇
      en: ROYCE' Cacao & Chocolate Town
      ja: ロイズカカオ＆チョコレートタウン
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/7rrKgTdQvdv2sNUdA
    address:
      full:
        zh: 北海道石狩郡当别町字太美町 record number 109
        ja: 〒061-3775 北海道石狩郡当別町
    notes_zh: >-
      2023 年开业的「从可可豆到巧克力」工厂体验。每日 10:00 – 17:00（最后入场 15:00）。
      门票：高中以上 ¥1,200；4 岁 – 中学 ¥500；3 岁以下免费。
      ⚠️ 必须提前在官网 e-tix 预约 —— 不接受现场无预约。
      交通：JR 学园都市线 札幌駅 → ロイズタウン駅（约 30 分钟） + 步行 7 分钟（有免费接驳巴士）。

  - id: odori-park-tv-tower
    name:
      zh: 大通公园 + 札幌电视塔
      en: Odori Park + Sapporo TV Tower
      ja: 大通公園・さっぽろテレビ塔
    kind: sight
    address:
      full:
        zh: 北海道札幌市中央区大通西 1
        ja: 〒060-0042 北海道札幌市中央区大通西1
    notes_zh: 札幌市中心公园地带。雪まつり 通常 2 月初，我们时间赶不上活动本身，但雪雕搭建可能已开始。

  - id: hokkaido-jingu
    name:
      zh: 北海道神宫
      en: Hokkaido Jingu
      ja: 北海道神宮
    kind: shrine
    address:
      full:
        zh: 北海道札幌市中央区宫之丘 474
        ja: 〒064-8505 北海道札幌市中央区宮ヶ丘474
    notes_zh: >-
      札幌核心神社，円山公園 内。日本传统 初詣（元旦第一次参拜）圣地，
      三が日（1/1 – 1/3）人流巨大。最近地铁：東西線 円山公園駅，步行 ~15 分钟。
      元旦当日：开门一般 0:00 跨年即开；白天人流高峰 10:00 – 14:00，
      9:00 前到可稍微避开最挤。冬季气温低，排队时间务必保暖。

  - id: jr-tower-t38
    name:
      zh: JR Tower 展望室 T38
      en: JR Tower Observatory T38
      ja: JRタワー展望室 タワー・スリーエイト
    kind: sight
    address:
      full:
        zh: 北海道札幌市中央区北 5 条西 2-5
        ja: 〒060-0005 北海道札幌市中央区北5条西2-5
    notes_zh: >-
      JR 札幌駅 正上方 38 F 展望台（海拔约 160 m），360° 札幌全景。
      平日营业 10:00 – 22:00（最终入场 21:30），门票 成人 ¥740。
      ★ 元旦「初日の出」特别开放：每年 1/1 清晨约 6:00 起提前开门迎接日出观赏；
      札幌元旦日出约 7:00。2027 年具体开放时间 + 票价出行前查官网确认。
      交通：JR 札幌駅 直通，零外出距离 —— 冬季早晨最便捷的日出观景点。

  - id: sapporo-white-illumination
    name:
      zh: 札幌白色灯节
      en: Sapporo White Illumination
      ja: さっぽろホワイトイルミネーション
    kind: sight
    address:
      full:
        zh: 北海道札幌市中央区大通西（大通公园会场） / 駅前通 / 南一条通 等多处
        ja: 〒060-0042 北海道札幌市中央区大通西（大通公園会場）ほか駅前通会場・南一条通会場
    notes_zh: >-
      札幌冬季代表灯饰活动，多会场联动。⚠️ 各会场时间不同：
      **大通公園 1 – 5 丁目会場**一般 11 月下旬 – 12 月 25 日前后结束，
      跨年夜（12/31）很可能已经结束；
      **駅前通会場 / 南一条通会場** 12 月 – 2 月持续点灯，跨年夜仍亮。
      出行前必查 sapporo-event.jp 公告确认 2026/27 各会场实际运营日。
      免费观赏；最近地铁 南北線 / 東西線 / 東豊線 大通駅。

  - id: munich-christmas-market-sapporo
    name:
      zh: 札幌慕尼黑圣诞市场
      en: Munich Christmas Market in Sapporo
      ja: ミュンヘン・クリスマス市 in Sapporo
    kind: shop
    address:
      full:
        zh: 北海道札幌市中央区大通西 2 丁目（大通公园 2 丁目）
        ja: 〒060-0042 北海道札幌市中央区大通西2丁目（大通公園2丁目）
    notes_zh: >-
      大通公园 2 丁目 与 札幌白色灯节 同档期的德式圣诞市集。
      ⚠️ 传统闭市日为 12 月 24 日 —— 跨年夜 12/31 几乎肯定已结束。
      如 12 月前半段抵札幌可顺路逛；跨年夜专程去会扑空，出行前查官网确认。

  - id: nijo-market-sapporo
    name:
      zh: 二条市场
      en: Nijo Market
      ja: 二条市場
    kind: shop
    address:
      full:
        zh: 北海道札幌市中央区南 3 条东 1 丁目
        ja: 〒060-0053 北海道札幌市中央区南3条東1丁目
    notes_zh: 早市，吃海鲜丼；适合札幌早上的活动。
