  - id: shirogane-blue-pond
    name:
      zh: 白金青池
      en: Shirogane Blue Pond (Aoiike)
      ja: 白金青い池
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/xM18uZ819nFR4Kz77
    address:
      full:
        zh: 北海道上川郡美瑛町白金
        ja: 〒071-0235 北海道上川郡美瑛町白金
    notes_zh: >-
      用户问：一天中什么时间去最好？
      ★ 夏季青色最亮（5 – 6 月），冬季池面结冰+积雪，白天的「蓝」不明显。
      ★ 冬季主看「ライトアップ 灯光秀」：2026-10-24 – 2027-04-22 期间日落后 – 21:00，
        12 月开始时间约 16:30，1 月约 17:00，每 10 分钟一段光影故事循环。
      ★ 2026-12-31 → 2027-01-03 灯光延长到凌晨 2:00 —— 我们在北海道过年，可安排在这个特别时段。
      推荐日程：日落前约 1 小时到达，白天 + 灯光亮起一次看完，约 45 – 60 分钟，带三脚架。

  - id: otaru-tengu-ropeway
    name:
      zh: 小樽 天狗山 缆车 (山麓站)
      en: Otaru Tenguyama Ropeway Base Station
      ja: 小樽天狗山ロープウェイ 山麓駅
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/jEUzKT7ByXnta1xF9
    address:
      full:
        zh: 北海道小樽市最上 2-16-15
        ja: 〒047-0024 北海道小樽市最上2-16-15
    notes_zh: >-
      532 m 山顶，约 4 分钟缆车到顶。「北海道三大夜景」之一（另两座：函馆山、藻岩山）。
      冬季营业 2026-11-29 – 2027-03-31（对应我们行程期间），每日 09:00 – 20:00，最后上行 19:48。
      单程成人 ¥1,800 往返。日落后上山看夜景最佳；山顶还有「心形雕塑」打卡点。

