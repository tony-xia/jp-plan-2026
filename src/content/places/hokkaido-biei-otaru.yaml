  - id: asari-otaru
    name:
      zh: 朝里 (小樽 航拍区)
      en: Asari District, Otaru (Drone & Self-filming Area)
      ja: 朝里（小樽 空撮・セルフフィルミングエリア）
    kind: sight
    googleMapsUrl: https://maps.app.goo.gl/uq4xJXgwdisyyzFa9
    address:
      full:
        zh: 北海道小樽市朝里(邮编 047-0151)
        ja: 〒047-0151 北海道小樽市朝里
    notes_zh: >-
      ★ 航拍日主场：「朝里スカイループ」札樽自動車道 朝里 IC 双层环形高架桥，
      是北海道最出片的航拍结构物之一，周围森林冬季全白。附近 朝里ダム、朝里川温泉 可补充取景。
      ⚠️ 无人机注意：
      ① DID 区：小樽市中心属 DID，朝里本地多半不在 DID —— 用地理院地图 DID 图层确认边界；
         凡 DID 区飞行需 ≥10 工作日前提交 DIPS 2.0 申请获 MLIT/JCAB 许可。
      ② 严禁直飞高速公路正上方 —— 必须从侧面或相邻非道路地面起飞。
      ③ 国定公园层：祝津 – 小樽海岸 属于 Niseko-Shakotan-Otaru Kaigan 国定公园 ——
         按北海道规则不强制申报，但进入自然保护区前检查标识和告示牌。
      ④ 冬季海边风大；消费级无人机超过约 10 m/s 就危险。天气差时走备用方案 —— 仅地面自拍。
      ⑤ 锂电池 -10℃ 容量下降约 30 – 40%。多备电池，贴身保温，飞前预热。

  - id: rusutsu-resort
    name:
      zh: 留寿都 度假村
      en: Rusutsu Resort
      ja: ルスツリゾート
    kind: sight
    googleMapsUrl: https://maps.google.com/?q=%E3%83%AB%E3%82%B9%E3%83%84%E3%83%AA%E3%82%BE%E3%83%BC%E3%83%88
    address:
      full:
        zh: 北海道虻田郡留寿都村泉川 13
        ja: 〒048-1711 北海道虻田郡留寿都村泉川13
    notes_zh: >-
      北海道最大度假综合体之一，位于小樽南方 ~90 km。我们不滑雪，但冬季可在度假村基地玩
      snow tubing / 雪上筏 / 雪地摩托、泡温泉、看 羊蹄山（Mt Yōtei）全景。周围村庄是典型的
      北海道雪乡小镇。★ 此行的重点是「往返走不同的路」，可以看到两边不同的冬景 ——
      建议去程走 札樽道 → 道央道 → 喜茂別 IC → R230 中山峠（名峠，有「峠の茶屋」炸薯球名店，
      冬季亦营业）；回程走 R276 → ニセコ → 倶知安 → R5 沿海经 余市 回小樽。
      也可反向行（ニセコ 去、中山峠 回），让夕照落在回程的山道上。
      ⚠️ 冬季 中山峠 与 ニセコ 海拔较高，暴雪时可能封路；出发前看「北海道開発局 道路情報」。
      门到门循环 + 现场游玩估计 7 – 9 小时。

  - id: nakayama-toge
    name:
      zh: 中山峠 (岭)
      en: Nakayama Pass (Route 230)
      ja: 中山峠
    kind: sight
    googleMapsUrl: https://maps.google.com/?q=%E4%B8%AD%E5%B1%B1%E5%B3%A0
    address:
      full:
        zh: 北海道虻田郡喜茂別町川上 345
        ja: 〒044-0222 北海道虻田郡喜茂別町川上345
    notes_zh: >-
      国道 230 号横跨的经典 Hokkaido 山口，海拔 ~835 m，可远望 羊蹄山（Mt Yōtei）。
      展望所有名产「中山峠 あげいも」（炸薯球，3 粒 ¥400 左右）全年营业。冬季暴雪时注意路况、
      可能有雪链要求。Rusutsu 往返的首选外道。

