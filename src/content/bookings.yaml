    details_zh: >-
      Listing 1461937569120840875 — Hakodate Motomachi HIST Terrace I。
      6 人 · 3BR · 6 床 · 2 浴；4.92 ★ / 12 条评价 · Guest favourite；"Rare find — 常年满房"。
      元町历史山坡区，近 函館山ロープウェイ 和 朝市。
      ⚠️ 2026-04-20 改期：原询价 2026-12-30 → 01-01（2 晚），需重新询价 2026-12-27 → 12-30（3 晚）。
      预订前核对：2BR + 2BA、4 人上限、冬季供暖、晚 check-in 宽容度（day-01 傍晚/夜间到达），价格仍有效。

