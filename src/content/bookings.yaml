  - id: phase1-rental-car
    kind: other
    title_zh: "Phase 1 租车（day 01 下午 軽井沢駅 取车 → day 03 下午 軽井沢駅 还车）"
    start: "2026-12-27"
    end: "2026-12-29"
    details_zh: >-
      4 人 + 冬季行李，推荐 SUV / 小型 minivan；带四驱和冬季雪胎。
      ★ 用户确认（2026-04-20）：取车不在羽田，而是在 軽井沢駅 附近分店 —— day 01 抵达羽田后换新干线到軽井沢駅，当地取车再开往住宿。
      ★ 用户确认：在 Phase 1 倒数第二天（day 03, 2026-12-29）下午还车，选同一 軽井沢駅 附近、住宿步行可达的分店。
      day 04 无车 —— 轻井泽高原教会 / 其他活动走路、町内バス 或 出租车。
      day 05 早上从 軽井沢駅 直接乘新干线去东京 → 新函馆北斗。

