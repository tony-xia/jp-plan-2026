  - id: hokkaido-toya-to-tokyo-transit
    kind: shinkansen
    title_zh: "Toya → Tokyo：JR 特急 北斗 + 北海道新干线（day-21，~6 – 6.5 小时）"
    from: { zh: 洞爺站, en: Toya Station, ja: 洞爺駅 }
    to: { zh: 东京站, en: Tokyo Station, ja: 東京駅 }
    start: "2027-01-15"
    details_zh: >-
      ★ 2026-04-22 第六版：Toya → Tokyo 直达，不绕回札幌。
      ① 特急 北斗 洞爺 → 新函馆北斗（南下，~2 小时）；② 北海道新干线 はやぶさ 新函馆北斗 → 东京（~4 小时）。
      两段都记得预约大行李指定席。Windsor 早班车直接送到 洞爺駅。
      ⚠️ 坏天气可以改飞：特急 北斗 → 札幌 → 新千歳 → 羽田（~1.5 小时）。

