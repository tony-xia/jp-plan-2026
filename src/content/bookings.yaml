    start: "2026-12-27"
    end: "2027-01-19"
    details_zh: >-
      四人同行，确认所有人 2026-12-27 早上抵达羽田；2027-01-19 从羽田（或成田）返程（trip 延长 1 天）。
      ★ 2026-04-20 改：Day-1 抵达羽田后直接换新干线前往函馆，当天不留宿东京。
      具体航班号待最终预订后填入。

  - id: day-01-haneda-to-hakodate
    kind: shinkansen
    title_zh: "新干线：羽田 → 东京 → 新函馆北斗 → 函馆（day 01，3 段 ~6 – 7 小时）"
    from: { zh: 东京羽田机场, en: Haneda Airport, ja: 東京国際空港（羽田） }
    to: { zh: 函馆站, en: Hakodate Station, ja: 函館駅 }
    start: "2026-12-27"
    coveredLegs:
      - { from: haneda-airport, to: tokyo-station }
      - { from: tokyo-station, to: shin-hakodate-hokuto-station }
      - { from: shin-hakodate-hokuto-station, to: hakodate-station }
    details_zh: >-
      3 段行程：① 羽田 → 东京站（单轨 / 京急 + JR 山手，~30 – 40 分）；
      ② 东京站 → 新函館北斗（東北・北海道新幹線「はやぶさ」，~4 小时）；
      ③ 新函館北斗 → 函馆（JR 函館ライナー，~15 – 20 分）。
      ★ 务必同时预约 ②「はやぶさ」特大荷物スペースつき座席（大行李指定席）—— 2020 年起强制，
      元旦前后几乎必售罄，需尽早。航班时间确定后一次预订三段。

